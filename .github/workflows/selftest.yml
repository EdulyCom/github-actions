name: ai-review selftest

on:
  pull_request:
  workflow_dispatch:
    inputs:
      pr_number:
        description: >
          Pull request number to review. Only needed for a manual run
          (e.g. a maintainer reviewing a fork PR) — a normal pull_request
          trigger resolves this automatically.
        required: false
        type: string

concurrency:
  group: ai-review-${{ inputs.pr_number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: write
    outputs:
      verdict: ${{ steps.r.outputs.verdict }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run ai-review
        id: r
        uses: ./ai-review
        with:
          pr-number: ${{ inputs.pr_number }}
          app-id: ${{ vars.MTM_BOT_APP_ID }}
          private-key: ${{ secrets.MTM_BOT_APP_PRIVATE_KEY }}

  gated-demo:
    needs: [review]
    if: ${{ needs.review.outputs.verdict == 'pass' }}
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Prove the verdict output gates this job
        run: echo "ai-review verdict was 'pass' — this job only runs because the gate passed."
