name: actionlint

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: actionlint-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  actionlint:
    name: Lint workflow and action files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          github_token: ${{ github.token }}
          # "local" reporter prints findings to the job log instead of
          # posting PR comments/checks, so this job needs no write scopes.
          # The workflow gates the PR the same way every other job in this
          # repo does: a non-zero exit fails the job, and the job's status
          # is the required context.
          reporter: local
          filter_mode: nofilter
          fail_level: error
