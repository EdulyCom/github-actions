name: ai-qa selftest

on:
  push:
    branches: [main]

concurrency:
  group: ai-qa-selftest
  cancel-in-progress: false

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run ai-qa
        uses: ./ai-qa
        with:
          app-id: ${{ vars.MTM_BOT_APP_ID }}
          private-key: ${{ secrets.MTM_BOT_APP_PRIVATE_KEY }}
          health-url: https://raw.githubusercontent.com/EdulyCom/github-actions/main/README.md
          test-command: "true"
