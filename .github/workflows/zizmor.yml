name: zizmor

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: zizmor-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  zizmor:
    name: Static analysis of GitHub Actions workflows
    runs-on: ubuntu-latest
    # Advanced Security (SARIF upload to the Security tab) is free for
    # public repos and is zizmor-action's own recommended default; these are
    # the exact permissions its README specifies for that mode.
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        uses: zizmorcore/zizmor-action@6599ee8b7a49aef6a770f63d261d214911a7ce02 # v0.6.0
