name: ai-review
description: >
  Runs the CI-native AI review gate against a pull request: authors a
  native GitHub PR review (APPROVE / REQUEST_CHANGES) and a pass/fail
  label, then exposes the verdict as a job output
  (`verdict`/`confidence`/`merge_risk`/`review_event`) a consumer's own CI
  reads to gate its heavier build/test/deploy lanes. See
  docs/adr/0001-ci-native-ai-review-gate.md for why the gate is an ordinary
  job output rather than an identity-pinned Check Run, and why the review
  identity is cosmetic. The verdict is produced by a real two-stage AI
  review pipeline: a Haiku context stage summarizes the diff, then a
  diff-size-routed Sonnet/Opus review stage performs the full rubric scan
  and returns a schema-validated result that a deterministic step
  recomputes the pass/fail decision from.

inputs:
  app-id:
    description: >
      GitHub App ID. Optional — when supplied together with `private-key`,
      the review and labels are authored under that App's own slug
      (`<app-slug>[bot]`) instead of `github-actions[bot]`. Purely a
      cosmetic identity choice; never a gate input. See ADR 0001 (b).
    required: false
  private-key:
    description: >
      GitHub App private key, paired with `app-id`. A token is minted for
      this job only, scoped to `pull-requests: write`, `issues: write`, and
      `checks: read` (never the installation's full permission set).
    required: false
  github-token:
    description: >
      Fallback token used to call the GitHub REST API when `app-id` /
      `private-key` are not set. Defaults to the calling workflow's own
      GITHUB_TOKEN; override only if the caller needs a different identity
      or scope. Also used directly (regardless of whether `app-id` /
      `private-key` are set) by the read-only Context stage, which never
      needs the App-minted write-scoped identity.
    required: false
    default: ${{ github.token }}
  pr-number:
    description: >
      Pull request number to review. Optional — defaults to the
      triggering event's `pull_request.number`. Required when the caller
      workflow is invoked via `workflow_dispatch` (e.g. a maintainer
      manually reviewing a fork PR).
    required: false
  pass-label:
    description: Label applied to the PR when the review verdict is a pass.
    required: false
    default: "✓ /ai-review"
  fail-label:
    description: Label applied to the PR when the review verdict is a fail.
    required: false
    default: "✗ /ai-review"
  qa-pass-label:
    description: >
      Post-merge `ai-qa` pass label. This action clears it (does not
      apply it) on every new commit so a stale QA badge from a prior
      commit doesn't linger on the PR.
    required: false
    default: "✓ /ai-qa"
  qa-fail-label:
    description: >
      Post-merge `ai-qa` fail label. This action clears it (does not
      apply it) on every new commit, for the same reason as
      `qa-pass-label`.
    required: false
    default: "✗ /ai-qa"
  confidence-threshold:
    description: >
      Minimum confidence (0-100) required for a pass verdict. Consumed by
      the deterministic Publish review step, which recomputes confidence
      from the review stage's reported P0-P3 counts and test-quality
      signals and compares it against this threshold.
    required: false
    default: "90"
  sonnet-model:
    description: >
      Model ID used by the diff-size routing step ONLY for tiny diffs
      (≤`sonnet-files-threshold` files AND ≤`sonnet-churn-threshold`
      changed lines). Every larger diff routes to `opus-model`. Consumed
      by the routing step, whose output feeds the Review stage as the
      model to run. Override when a gateway aliases model names.
    required: false
    default: "claude-sonnet-5"
  opus-model:
    description: >
      Model ID used by the diff-size routing step for all non-tiny diffs
      (the default — the review stage prefers Opus, dropping to
      `sonnet-model` only for trivially small changes). Consumed by the
      routing step, whose output feeds the Review stage as the model to
      run. Override when a gateway aliases model names.
    required: false
    default: "claude-opus-4-8"
  sonnet-files-threshold:
    description: >
      Max changed-file count for a diff to still be considered "tiny" and
      routed to `sonnet-model`. A diff qualifies for Sonnet only when it
      is at or under BOTH this and `sonnet-churn-threshold`; anything
      larger routes to `opus-model`.
    required: false
    default: "3"
  sonnet-churn-threshold:
    description: >
      Max changed-line count (additions + deletions) for a diff to still
      be considered "tiny" and routed to `sonnet-model`. Applied together
      with `sonnet-files-threshold` (both must hold for Sonnet).
    required: false
    default: "60"
  haiku-model:
    description: >
      Model ID used by the context stage (this phase) to read the diff and changed
      files and write context.md for the review stage to consume. Override when a
      gateway aliases model names.
    required: false
    default: "claude-haiku-4-5-20251001"
  anthropic-api-key:
    description: >
      Anthropic API key, sent as the `x-api-key` header. Mutually exclusive with
      `anthropic-auth-token` — supply exactly one. Required for both the Context stage
      and the Review stage (Sonnet/Opus) to call the Anthropic API.
    required: false
  anthropic-auth-token:
    description: >
      Anthropic bearer token (`Authorization: Bearer …`), for gateways that
      authenticate this way instead of an API key. Mutually exclusive with
      `anthropic-api-key` — supply exactly one. Internally, this value is also passed
      as a fallback `anthropic_api_key` to the context stage due to an upstream
      validation gap (anthropics/claude-code-action#1294).
    required: false
  anthropic-base-url:
    description: >
      Optional override for the Anthropic API base URL (e.g. a caller's custom
      gateway). When omitted, the standard Anthropic endpoint is used.
    required: false
  test-command:
    description: >
      Optional explicit command the Review stage runs to execute the
      project's tests (e.g. `npm test`, `pytest -q`). Best-effort: the
      caller workflow must install the toolchain/dependencies BEFORE this
      action so the command can run. When empty, the model may still
      auto-detect and run an obvious test command, and skips gracefully
      (reporting `test_execution: skipped`) when no toolchain is present.
    required: false
  test-hint:
    description: >
      Optional free-text guidance passed to the Review stage about how to
      build/run/verify this project (setup steps, which suites matter,
      known-flaky areas). Interpolated into the review prompt alongside
      `test-command`.
    required: false
  update-pr-body:
    description: >
      When 'true' (default), the Publish step ticks verified checklist
      boxes (`- [ ]` → `- [x]`) in the PR description in place and
      maintains a managed `<!-- ai-review-status -->` block with per-item
      verification evidence. It never unchecks a human-checked box. Set to
      'false' to leave the PR body untouched.
    required: false
    default: "true"
  update-linked-issues:
    description: >
      Reserved for parity with `ai-qa`. When 'true' (default), the Review
      stage resolves issues the PR closes (closing keywords + GitHub's
      linked-issue graph) and evaluates the diff against their acceptance
      criteria. ai-review only READS linked issues; it never mutates issue
      state (that is ai-qa's post-merge job).
    required: false
    default: "true"

outputs:
  verdict:
    description: "'pass' or 'fail'. Empty when the review was skipped (fork PR, draft, or closed)."
    value: ${{ steps.publish.outputs.verdict }}
  confidence:
    description: "Confidence score, 0-100."
    value: ${{ steps.publish.outputs.confidence }}
  merge_risk:
    description: "'low', 'medium', or 'high'."
    value: ${{ steps.publish.outputs.merge_risk }}
  review_event:
    description: "GitHub review event posted: APPROVE or REQUEST_CHANGES."
    value: ${{ steps.publish.outputs.review_event }}

runs:
  using: composite
  steps:
    - name: Author token
      id: author
      if: inputs.app-id != '' && inputs.private-key != ''
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        permission-pull-requests: write
        permission-issues: write
        permission-checks: read

    - name: Resolve author identity
      id: identity
      shell: bash
      env:
        APP_TOKEN: ${{ steps.author.outputs.token }}
        APP_SLUG: ${{ steps.author.outputs.app-slug }}
        FALLBACK_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        if [ -n "${APP_TOKEN}" ]; then
          echo "::add-mask::${APP_TOKEN}"
          {
            echo "author-token=${APP_TOKEN}"
            echo "author-login=${APP_SLUG}[bot]"
          } >> "${GITHUB_OUTPUT}"
        else
          echo "::add-mask::${FALLBACK_TOKEN}"
          {
            echo "author-token=${FALLBACK_TOKEN}"
            echo "author-login=github-actions[bot]"
          } >> "${GITHUB_OUTPUT}"
        fi

    - name: Resolve PR number
      id: pr
      shell: bash
      env:
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        INPUT_CONFIDENCE_THRESHOLD: ${{ inputs.confidence-threshold }}
      run: |
        set -euo pipefail
        PR_NUMBER="${INPUT_PR_NUMBER:-${EVENT_PR_NUMBER}}"
        if [ -z "${PR_NUMBER}" ]; then
          echo "::error::No pr-number input and no pull_request event payload; nothing to review."
          exit 1
        fi
        echo "pr-number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
        # inputs.confidence-threshold's declared default ("90") only applies when the
        # caller omits the key entirely. Callers that unconditionally forward
        # github.event.inputs.confidence_threshold (empty outside workflow_dispatch)
        # pass an explicit empty string, which overrides the default — and
        # Number('') is 0 in JS, silently disabling the threshold. Fall back here.
        echo "confidence-threshold=${INPUT_CONFIDENCE_THRESHOLD:-90}" >> "${GITHUB_OUTPUT}"

    - name: Fork guard
      id: fork-guard
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
      run: |
        set -euo pipefail
        if [ "${EVENT_NAME}" = "pull_request" ] && [ -n "${HEAD_REPO}" ] && [ -n "${BASE_REPO}" ] && [ "${HEAD_REPO}" != "${BASE_REPO}" ]; then
          echo "::notice::skipped — fork; maintainer can workflow_dispatch"
          echo "is-fork=true" >> "${GITHUB_OUTPUT}"
        else
          echo "is-fork=false" >> "${GITHUB_OUTPUT}"
        fi

    - name: Clear stale labels on new commit
      id: stale-clear
      if: steps.fork-guard.outputs.is-fork != 'true' && github.event.action == 'synchronize'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
        PASS_LABEL: ${{ inputs.pass-label }}
        FAIL_LABEL: ${{ inputs.fail-label }}
        QA_PASS_LABEL: ${{ inputs.qa-pass-label }}
        QA_FAIL_LABEL: ${{ inputs.qa-fail-label }}
      with:
        github-token: ${{ steps.identity.outputs.author-token }}
        script: |
          const prNumber = Number(process.env.PR_NUMBER);
          const labels = [
            process.env.PASS_LABEL,
            process.env.FAIL_LABEL,
            process.env.QA_PASS_LABEL,
            process.env.QA_FAIL_LABEL,
          ];

          for (const name of labels) {
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name,
              });
              core.info(`Removed stale label '${name}'.`);
            } catch (err) {
              if (err.status === 404 || err.status === 422) {
                core.info(`Label '${name}' not present; skipping.`);
              } else {
                throw err;
              }
            }
          }

    - name: Draft/closed gate
      id: pr-state
      if: steps.fork-guard.outputs.is-fork != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.identity.outputs.author-token }}
        PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        STATE_JSON="$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json isDraft,state,baseRefName,headRefOid)"
        IS_DRAFT="$(echo "${STATE_JSON}" | jq -r '.isDraft')"
        STATE="$(echo "${STATE_JSON}" | jq -r '.state')"
        BASE_REF="$(echo "${STATE_JSON}" | jq -r '.baseRefName')"
        HEAD_SHA="$(echo "${STATE_JSON}" | jq -r '.headRefOid')"
        {
          echo "base-ref=${BASE_REF}"
          echo "head-sha=${HEAD_SHA}"
        } >> "${GITHUB_OUTPUT}"
        if [ "${IS_DRAFT}" = "true" ] || [ "${STATE}" = "CLOSED" ] || [ "${STATE}" = "MERGED" ]; then
          echo "::notice::skipped — PR is draft or closed"
          echo "skip=true" >> "${GITHUB_OUTPUT}"
        else
          echo "skip=false" >> "${GITHUB_OUTPUT}"
        fi

    - name: Check out PR head
      id: checkout
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ steps.pr-state.outputs.head-sha }}
        fetch-depth: 0
        persist-credentials: false

    - name: Compute diff stats and route model
      id: route
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true'
      shell: bash
      env:
        BASE_REF: ${{ steps.pr-state.outputs.base-ref }}
        SONNET: ${{ inputs.sonnet-model }}
        OPUS: ${{ inputs.opus-model }}
        FILES_MAX: ${{ inputs.sonnet-files-threshold }}
        CHURN_MAX: ${{ inputs.sonnet-churn-threshold }}
      run: |
        set -euo pipefail
        NUMSTAT="$(git diff --numstat "origin/${BASE_REF}...HEAD")"
        if [ -z "${NUMSTAT}" ]; then
          FILES=0
          CHURN=0
        else
          FILES="$(printf '%s\n' "${NUMSTAT}" | wc -l | tr -d ' ')"
          # Binary-file numstat rows report "-" for added/removed instead of a
          # number (e.g. "-\t-\tpath"); awk coerces non-numeric fields to 0,
          # so binary churn is intentionally counted as 0 here. This is an
          # accepted limitation matching the task brief's own formula, not a
          # bug — do not re-flag it.
          CHURN="$(printf '%s\n' "${NUMSTAT}" | awk '{a+=$1; r+=$2} END {print a+r+0}')"
        fi
        # Opus-by-default routing: the review stage prefers Opus for its
        # stronger reasoning, dropping to Sonnet ONLY for trivially tiny
        # diffs (at or under BOTH thresholds). Everything else → Opus.
        FILES_MAX="${FILES_MAX:-3}"
        CHURN_MAX="${CHURN_MAX:-60}"
        if [ "${FILES}" -le "${FILES_MAX}" ] && [ "${CHURN}" -le "${CHURN_MAX}" ]; then
          MODEL="${SONNET:-claude-sonnet-5}"
        else
          MODEL="${OPUS:-claude-opus-4-8}"
        fi
        {
          echo "files=${FILES}"
          echo "churn=${CHURN}"
          echo "model=${MODEL}"
        } >> "${GITHUB_OUTPUT}"

    - name: Resolve linked issues
      id: linked-issues
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true' && inputs.update-linked-issues == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.identity.outputs.author-token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
      run: |
        set -euo pipefail
        # Deterministically resolve every issue this PR closes — via closing
        # keywords (Closes/Fixes/Resolves #N) AND the GitHub "linked issues"
        # UI — using the PR's closingIssuesReferences graph. Writes an array
        # of {number,title,body,state,url,labels} to .ai-review/linked-issues.json
        # for the Review stage's Angle H (intent alignment). Best-effort: any
        # failure degrades to an empty array (the model falls back to the PR
        # body). NOTE: this resolver + schema is intentionally mirrored in
        # ai-qa/action.yml (post-merge issue updates) — keep the two in sync.
        mkdir -p .ai-review
        OUT=".ai-review/linked-issues.json"
        echo '[]' > "${OUT}"
        if [ -n "${PR_NUMBER}" ]; then
          OWNER="${REPO%%/*}"
          NAME="${REPO##*/}"
          RESP="$(gh api graphql \
            -f query='query($owner:String!,$repo:String!,$pr:Int!){repository(owner:$owner,name:$repo){pullRequest(number:$pr){closingIssuesReferences(first:20){nodes{number title body state url labels(first:20){nodes{name}}}}}}}' \
            -F owner="${OWNER}" -F repo="${NAME}" -F pr="${PR_NUMBER}" 2>/dev/null || echo '')"
          if [ -n "${RESP}" ]; then
            printf '%s' "${RESP}" | jq '[.data.repository.pullRequest.closingIssuesReferences.nodes[] | {number, title, body, state, url, labels: [.labels.nodes[].name]}]' > "${OUT}" 2>/dev/null || echo '[]' > "${OUT}"
          fi
        fi
        COUNT="$(jq 'length' "${OUT}" 2>/dev/null || echo 0)"
        echo "count=${COUNT}" >> "${GITHUB_OUTPUT}"
        echo "Resolved ${COUNT} linked issue(s) for PR #${PR_NUMBER:-?}."

    - name: Context stage (Haiku)
      id: context
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true'
      uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1.0.177
      # This action version rejects ANTHROPIC_AUTH_TOKEN alone (anthropics/claude-code-action#1294),
      # so the bearer token also fills anthropic_api_key to pass validation, while
      # ANTHROPIC_CUSTOM_HEADERS carries the real bearer credential used on the wire.
      env:
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic-base-url }}
        ANTHROPIC_CUSTOM_HEADERS: "${{ inputs.anthropic-auth-token != '' && format('Authorization: Bearer {0}', inputs.anthropic-auth-token) || '' }}"
      with:
        anthropic_api_key: ${{ inputs.anthropic-api-key != '' && inputs.anthropic-api-key || inputs.anthropic-auth-token }}
        # Deliberately NOT steps.identity.outputs.author-token: this stage only
        # reads the local working tree and writes context.md, so it gets the
        # unprivileged fallback token rather than the App-minted
        # pull-requests/issues/checks-scoped identity used by the publishing
        # steps later in this action.
        github_token: ${{ inputs.github-token }}
        # Root cause of the context.md handoff failure (Task 2.4 fix round): this
        # step ran with NO --allowedTools at all, so claude-code-action's headless
        # permission model silently denied every Write and most Bash tool calls
        # (confirmed via live run 29635771162's Context-stage permission_denials_count
        # of 6, and anthropics/claude-code-action's own base-action/README.md, which
        # shows `Write` must be explicitly allowlisted — it is not a default tool).
        # Both stages run as plain composite-action steps on the same runner
        # checkout (no container isolation), so once Write is permitted here, the
        # Review stage's relative-path read of `context.md` at the repository root
        # resolves to the same file.
        claude_args: |
          --model ${{ inputs.haiku-model }}
          --allowedTools "Read,Grep,Glob,Write,Bash(git diff:*),Bash(git symbolic-ref:*),Bash(git remote show:*),Bash(git merge-base:*),Bash(git log:*),Bash(git show:*)"
        prompt: |
          Read the PR diff (the working tree is already checked out at the PR head
          commit; diff it against the merge-base with the repository's default
          branch — discover the default branch yourself, e.g. via `git remote show
          origin` or `git symbolic-ref refs/remotes/origin/HEAD`, if you need it) and
          the full contents of every changed file. Grep the repository for callers,
          callees, and helper functions related to the changed code, so a reviewer
          has the surrounding context without re-deriving it.

          Write a concise summary to `context.md` at the repository root covering:
          - what changed, in plain language
          - which files/functions call into or are called by the changed code
          - any related helpers, shared utilities, or patterns the changed code
            reuses or should have reused

          Do NOT review the change. Do NOT judge correctness, quality, or security.
          Do NOT produce a verdict, opinion, or recommendation of any kind. Your only
          output is the factual context.md summary — a later stage does the review.

    - name: Verify context.md handoff
      id: context-verify
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true'
      shell: bash
      run: |
        set -euo pipefail
        # Durable regression check for the Task 2.4 fix-round finding that the
        # Context stage's Write tool calls were silently denied (see the
        # --allowedTools comment on the Context stage step above). This makes
        # the handoff's health visible in every run's plain step log instead of
        # requiring a permission_denials_count archaeology dig.
        if [ ! -s context.md ]; then
          echo "::warning::context.md is missing or empty after the Context stage ran — the Review stage will not have handoff context. Check the Context stage step's tool-permission denials."
          exit 0
        fi
        echo "context.md present: $(wc -l < context.md) lines, $(wc -c < context.md) bytes"
        echo "--- context.md preview (first 20 lines) ---"
        head -n 20 context.md

    - name: CI signal (re-review only)
      id: ci-signal
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.identity.outputs.author-token }}
        EVENT_NAME: ${{ github.event_name }}
        REPO: ${{ github.repository }}
        HEAD_SHA: ${{ steps.pr-state.outputs.head-sha }}
      run: |
        # Best-effort only — this step must never hard-fail the job, so it
        # deliberately omits `set -e`. A normal pull_request run is the
        # *first* CI job: no required check has a completed conclusion yet,
        # so a real CI signal only exists on a manual workflow_dispatch
        # re-review, after CI has already run once.
        set -uo pipefail
        SIGNAL="no_ci"
        if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
          CHECK_RUNS="$(gh api "repos/${REPO}/commits/${HEAD_SHA}/check-runs" --jq '.check_runs' 2>/dev/null)"
          if [ -n "${CHECK_RUNS}" ] && [ "${CHECK_RUNS}" != "[]" ] && [ "${CHECK_RUNS}" != "null" ]; then
            # If any returned check-run has not yet reached "completed"
            # (queued/in_progress), the signal is inconclusive — never guess
            # a pass/fail from a partial subset of still-running checks.
            if echo "${CHECK_RUNS}" | jq -e 'any(.[]; .status != "completed")' >/dev/null 2>&1; then
              SIGNAL="no_ci"
            else
              CONCLUSIONS="$(echo "${CHECK_RUNS}" | jq '[.[] | .conclusion]')"
              if echo "${CONCLUSIONS}" | jq -e 'any(.[]; . == "timed_out")' >/dev/null 2>&1; then
                SIGNAL="timeout"
              elif echo "${CONCLUSIONS}" | jq -e 'any(.[]; . == "failure" or . == "cancelled" or . == "action_required")' >/dev/null 2>&1; then
                SIGNAL="fail"
              elif echo "${CONCLUSIONS}" | jq -e 'all(.[]; . == "success" or . == "neutral" or . == "skipped")' >/dev/null 2>&1; then
                SIGNAL="pass"
              fi
            fi
          fi
        fi
        echo "signal=${SIGNAL}" >> "${GITHUB_OUTPUT}"

    - name: Review stage (Sonnet/Opus)
      id: review
      # continue-on-error: claude-code-action intermittently finishes the
      # session successfully but without emitting structured_output and then
      # exits 1 (upstream flakiness). Don't crash the job — the retry step
      # below re-attempts, and Publish degrades gracefully if both miss.
      continue-on-error: true
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true'
      uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1.0.177
      # Same anthropics/claude-code-action#1294 workaround as the Context stage above:
      # this action version rejects ANTHROPIC_AUTH_TOKEN alone, so the bearer token also
      # fills anthropic_api_key to pass validation, while ANTHROPIC_CUSTOM_HEADERS carries
      # the real bearer credential on the wire.
      env:
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic-base-url }}
        ANTHROPIC_CUSTOM_HEADERS: "${{ inputs.anthropic-auth-token != '' && format('Authorization: Bearer {0}', inputs.anthropic-auth-token) || '' }}"
        PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
        TEST_COMMAND: ${{ inputs.test-command }}
        TEST_HINT: ${{ inputs.test-hint }}
      with:
        anthropic_api_key: ${{ inputs.anthropic-api-key != '' && inputs.anthropic-api-key || inputs.anthropic-auth-token }}
        # Deliberately NOT steps.identity.outputs.author-token, for the same
        # least-privilege reason as the Context stage: this step only reads the
        # repo, calls the Anthropic API, and returns structured output — it
        # never calls the GitHub API to post anything. The App-minted identity
        # is reserved for the deterministic Publish review step below.
        github_token: ${{ inputs.github-token }}
        plugins: superpowers@superpowers-marketplace
        plugin_marketplaces: https://github.com/obra/superpowers-marketplace.git
        claude_args: |
          --model ${{ steps.route.outputs.model }}
          --allowedTools "Read,Grep,Glob,Bash(gh pr view:*),Bash(gh issue view:*),Bash(git diff:*),Bash(git symbolic-ref:*),Bash(git merge-base:*),Bash(git remote show:*),Bash(git log:*),Bash(git show:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(ls:*),Bash(find:*),Bash(wc:*),Bash(node:*),Bash(npm:*),Bash(npx:*),Bash(yarn:*),Bash(pnpm:*),Bash(corepack:*),Bash(pytest:*),Bash(make:*)"
          --json-schema '{"type":"object","additionalProperties":false,"required":["verdict","confidence","merge_risk","intent","counts","review_event","comment_markdown"],"properties":{"verdict":{"type":"string","enum":["pass","fail"]},"confidence":{"type":"integer","minimum":0,"maximum":100},"merge_risk":{"type":"string","enum":["low","med","high"]},"intent":{"type":"string","enum":["aligned","partial","deviated","skipped"]},"counts":{"type":"object","additionalProperties":false,"required":["p0","p1","p2","p3"],"properties":{"p0":{"type":"integer","minimum":0},"p1":{"type":"integer","minimum":0},"p2":{"type":"integer","minimum":0},"p3":{"type":"integer","minimum":0}}},"review_event":{"type":"string","enum":["APPROVE","REQUEST_CHANGES"]},"comment_markdown":{"type":"string"},"tests_failing":{"type":"boolean"},"coverage_below_threshold_on_critical_paths":{"type":"boolean"},"no_tests_for_changed_logic":{"type":"boolean"},"test_execution":{"type":"string","enum":["passed","failed","skipped","not_run"]},"verification_evidence":{"type":"array","items":{"type":"object","additionalProperties":false,"required":["claim","command","result"],"properties":{"claim":{"type":"string"},"command":{"type":"string"},"result":{"type":"string"}}}},"checklist":{"type":"array","items":{"type":"object","additionalProperties":false,"required":["text","status"],"properties":{"text":{"type":"string"},"status":{"type":"string","enum":["verified","failed","unverifiable"]},"evidence":{"type":"string"}}}}}}'
        prompt: |
          You are performing an automated code review. Attempt to load the
          live `/requesting-code-review` and `/verification-before-completion`
          skills if the superpowers plugin installed successfully; if either
          is unavailable, proceed without it — do not fail or block on a
          missing plugin. Apply `/verification-before-completion` throughout:
          treat NO pass/verified claim as valid without fresh evidence — the
          command you ran and its actual output/exit code. If you assert a
          check passed, you must have run it and read the result this session.

          Read `${{ github.action_path }}/rubric.md`. This is the
          authoritative review methodology: an 8-angle scan (intent alignment
          first, then line-by-line diff, removed-behavior audit, cross-file
          tracing, reuse, simplification, efficiency, altitude), a severity
          scale (P0-P3), and a full review checklist. Follow it.

          The PR number is available in the `PR_NUMBER` environment variable.
          Run `gh pr view "$PR_NUMBER" --json title,body,url,number` to read
          the PR's stated goal. A deterministic earlier step has already
          resolved every issue this PR closes (via closing keywords AND
          GitHub's linked-issue graph) into `.ai-review/linked-issues.json`
          at the repository root — read that file. For each linked issue it
          lists, treat the issue's title/body/acceptance-criteria as the
          PRIMARY intent contract for the rubric's Angle H (Intent
          alignment); `gh issue view <n> --json title,body,state,labels` is
          available if you need more detail. Establish this stated goal
          BEFORE analyzing the diff, per the rubric's Angle H methodology
          (frame-setting must happen before code analysis, not after). If
          `.ai-review/linked-issues.json` is absent or empty, fall back to
          the PR title/body as the intent source.

          Read `context.md` at the repository root (written by an earlier
          context-gathering stage) for a summary of what changed and its
          callers/callees/related helpers.

          Read the PR diff yourself: the working tree is already checked out
          at the PR head commit; diff it against the merge-base with the
          repository's default branch (discover the default branch yourself,
          e.g. via `git symbolic-ref refs/remotes/origin/HEAD`). Read the
          COMPLETE contents of every changed file (and any caller/callee you
          need to judge correctness) with `Read` — never sample, truncate, or
          reason from the diff hunks alone. There is no size cap; large files
          are why this diff was routed to the stronger model.

          Perform the full 8-angle scan from the rubric against the diff.
          Classify every confirmed or plausible finding into P0/P1/P2/P3 per
          the rubric's severity definitions, and count them.

          Run the tests, best-effort. The caller is expected to have
          installed the project's toolchain/dependencies before this action.
          If `TEST_COMMAND` (env) is set, run exactly that; otherwise
          auto-detect an obvious command (e.g. `npm test`/`npm run test`,
          `pytest -q`, `make test`) from the repo's manifests. Consider
          `TEST_HINT` (env) for setup/guidance. Set `test_execution` to:
          `passed` (command ran, exit 0), `failed` (command ran, non-zero),
          `skipped` (no toolchain/deps available, or command errored on
          environment — not a real test failure), or `not_run` (no test
          command exists / diff is not testable). NEVER report `passed`
          without having actually run the command and read its output this
          session (`/verification-before-completion`). When you run tests,
          record the command and its key output line(s) in
          `verification_evidence`.

          Also assess test quality per the rubric's Testing section: are
          there tests for the changed logic (`no_tests_for_changed_logic`),
          is coverage on critical paths below target
          (`coverage_below_threshold_on_critical_paths`), and are any tests
          failing (`tests_failing`)? Set `tests_failing: true` if
          `test_execution` is `failed`. Report these as booleans; omit any
          you cannot assess rather than guessing. Per the rubric's exemption:
          if this diff is Docs/Config-only per §12's test requirement matrix
          (CI/workflow YAML, composite action wiring, markdown, prompt text,
          or other config with no unit-testable logic — nothing a test could
          exercise), report `no_tests_for_changed_logic: false` — that row
          requires no tests, so none missing is not a defect.

          Evaluate the PR description's checklist. If the PR body (or a
          linked issue) contains `- [ ]`/`- [x]` checklist items, return a
          `checklist` array: one entry per item with its `text` copied
          verbatim (without the `- [ ]`/`- [x]` prefix), a `status` of
          `verified` (you confirmed it is satisfied — cite how in
          `evidence`), `failed` (you confirmed it is NOT satisfied), or
          `unverifiable` (cannot be checked from code/tests, e.g. a manual
          or post-merge step). Only mark `verified` with real evidence per
          `/verification-before-completion`. A later deterministic step uses
          this to tick verified boxes in the PR body; do not edit the PR body
          yourself. Per the rubric, checklist status is a P2 reminder at
          most — do not fail the review solely on incomplete checklist items.

          Write a complete review as `comment_markdown`: findings grouped by
          severity (P0 Blockers, P1 Should Fix, P2 Nice-to-Have, P3 Nits —
          state "_None._" for empty sections), and strengths. Do not include
          a leading verdict token, a confidence/merge-risk line, or any HTML
          marker comment in `comment_markdown` — the caller deterministically
          recomputes the verdict and prepends its own banner separately.

          Return your full assessment via the required structured output
          schema. `counts` must be accurate — a later deterministic step
          recomputes the actual pass/fail decision from `counts` alone and
          does not trust your `verdict` field; report it anyway as your own
          best assessment.

    # Retry of the Review stage — runs only if the first attempt failed or
    # returned no structured_output (the intermittent claude-code-action miss).
    # Same model/tools/schema/credentials; a condensed prompt that re-runs the
    # full review and stresses that emitting structured output is mandatory.
    # Keep the model/tools/schema in sync with the Review stage step above.
    - name: Review stage (Sonnet/Opus) — retry
      id: review_retry
      continue-on-error: true
      if: >-
        steps.fork-guard.outputs.is-fork != 'true' &&
        steps.pr-state.outputs.skip != 'true' &&
        (steps.review.outcome == 'failure' || steps.review.outputs.structured_output == '')
      uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1.0.177
      env:
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic-base-url }}
        ANTHROPIC_CUSTOM_HEADERS: "${{ inputs.anthropic-auth-token != '' && format('Authorization: Bearer {0}', inputs.anthropic-auth-token) || '' }}"
        PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
      with:
        anthropic_api_key: ${{ inputs.anthropic-api-key != '' && inputs.anthropic-api-key || inputs.anthropic-auth-token }}
        github_token: ${{ inputs.github-token }}
        plugins: superpowers@superpowers-marketplace
        plugin_marketplaces: https://github.com/obra/superpowers-marketplace.git
        claude_args: |
          --model ${{ steps.route.outputs.model }}
          --allowedTools "Read,Grep,Glob,Bash(gh pr view:*),Bash(gh issue view:*),Bash(git diff:*),Bash(git symbolic-ref:*),Bash(git merge-base:*),Bash(git remote show:*),Bash(git log:*),Bash(git show:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(ls:*),Bash(find:*),Bash(wc:*),Bash(node:*),Bash(npm:*),Bash(npx:*),Bash(yarn:*),Bash(pnpm:*),Bash(corepack:*),Bash(pytest:*),Bash(make:*)"
          --json-schema '{"type":"object","additionalProperties":false,"required":["verdict","confidence","merge_risk","intent","counts","review_event","comment_markdown"],"properties":{"verdict":{"type":"string","enum":["pass","fail"]},"confidence":{"type":"integer","minimum":0,"maximum":100},"merge_risk":{"type":"string","enum":["low","med","high"]},"intent":{"type":"string","enum":["aligned","partial","deviated","skipped"]},"counts":{"type":"object","additionalProperties":false,"required":["p0","p1","p2","p3"],"properties":{"p0":{"type":"integer","minimum":0},"p1":{"type":"integer","minimum":0},"p2":{"type":"integer","minimum":0},"p3":{"type":"integer","minimum":0}}},"review_event":{"type":"string","enum":["APPROVE","REQUEST_CHANGES"]},"comment_markdown":{"type":"string"},"tests_failing":{"type":"boolean"},"coverage_below_threshold_on_critical_paths":{"type":"boolean"},"no_tests_for_changed_logic":{"type":"boolean"},"test_execution":{"type":"string","enum":["passed","failed","skipped","not_run"]},"verification_evidence":{"type":"array","items":{"type":"object","additionalProperties":false,"required":["claim","command","result"],"properties":{"claim":{"type":"string"},"command":{"type":"string"},"result":{"type":"string"}}}},"checklist":{"type":"array","items":{"type":"object","additionalProperties":false,"required":["text","status"],"properties":{"text":{"type":"string"},"status":{"type":"string","enum":["verified","failed","unverifiable"]},"evidence":{"type":"string"}}}}}}'
        prompt: |
          This is a RETRY of an automated code review whose previous attempt
          ended without returning the required structured output. Emitting the
          structured output as your FINAL action is mandatory this time.

          Read `${{ github.action_path }}/rubric.md` (the authoritative 8-angle
          scan + P0-P3 severities + checklist) and `context.md` at the repo root
          if present. The PR number is in the `PR_NUMBER` environment variable;
          the PR head is already checked out. Run
          `gh pr view "$PR_NUMBER" --json title,body,url,number` and `git diff`
          against the merge base to get the change under review. Read
          `.ai-review/linked-issues.json` (repo root) if present and use each
          linked issue's acceptance criteria as the intent contract for Angle
          H. Attempt to load `/verification-before-completion` and
          `/requesting-code-review` (best-effort). Read complete file contents,
          never just the diff hunks. If a `TEST_COMMAND` env var is set (or an
          obvious test command exists) and the toolchain is available, run it
          and set `test_execution` accordingly — never claim `passed` without
          running it. You MAY populate the optional `checklist`,
          `verification_evidence`, and `test_execution` fields; omit them if
          you cannot assess them.

          Perform the full review per the rubric, then write `comment_markdown`
          (findings grouped by severity P0-P3 with "_None._" for empty sections,
          plus strengths; no leading verdict token / confidence line / HTML
          marker — the caller prepends its own banner). `counts` must be
          accurate; a deterministic step recomputes the pass/fail decision.

          Return your assessment via the required structured output schema. Do
          NOT end your turn without emitting the structured output.

    - name: Reset prior review and labels
      id: reset
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
        AUTHOR_LOGIN: ${{ steps.identity.outputs.author-login }}
        PASS_LABEL: ${{ inputs.pass-label }}
        FAIL_LABEL: ${{ inputs.fail-label }}
        QA_PASS_LABEL: ${{ inputs.qa-pass-label }}
        QA_FAIL_LABEL: ${{ inputs.qa-fail-label }}
      with:
        github-token: ${{ steps.identity.outputs.author-token }}
        script: |
          const prNumber = Number(process.env.PR_NUMBER);
          const authorLogin = process.env.AUTHOR_LOGIN;

          const { data: reviews } = await github.rest.pulls.listReviews({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: prNumber,
          });

          // dismissReview only accepts APPROVED or CHANGES_REQUESTED reviews
          // (a COMMENTED review throws a 422) — filter before calling it, and
          // still wrap the call defensively in case of a race.
          const dismissible = reviews.filter(
            (review) =>
              review.user?.login === authorLogin &&
              (review.state === "APPROVED" || review.state === "CHANGES_REQUESTED"),
          );

          for (const review of dismissible) {
            try {
              await github.rest.pulls.dismissReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                review_id: review.id,
                message: "Superseded by a new ai-review run.",
              });
              core.info(`Dismissed prior review #${review.id} by '${authorLogin}'.`);
            } catch (err) {
              if (err.status === 404 || err.status === 422) {
                core.info(`Review #${review.id} could not be dismissed; skipping.`);
              } else {
                throw err;
              }
            }
          }

          // Hide (collapse as OUTDATED) every prior ai-review review by this
          // bot so stale reviews don't pile up when a fresh one is posted.
          // Uses the GraphQL minimizeComment mutation — PullRequestReview
          // implements Minimizable. Marker-scoped (`<!-- ai-review -->`), so
          // human reviews and other bots' reviews are never touched; non-fatal
          // on error (already minimized, or the token lacks minimize perms).
          const staleReviews = reviews.filter(
            (review) =>
              review.user?.login === authorLogin &&
              typeof review.body === "string" &&
              review.body.includes("<!-- ai-review -->") &&
              review.node_id,
          );

          for (const review of staleReviews) {
            try {
              await github.graphql(
                `mutation ($id: ID!) {
                  minimizeComment(input: { subjectId: $id, classifier: OUTDATED }) {
                    minimizedComment { isMinimized }
                  }
                }`,
                { id: review.node_id },
              );
              core.info(`Minimized prior ai-review review #${review.id} as outdated.`);
            } catch (err) {
              core.info(`Could not minimize review #${review.id}: ${err.message}`);
            }
          }

          const labels = [
            process.env.PASS_LABEL,
            process.env.FAIL_LABEL,
            process.env.QA_PASS_LABEL,
            process.env.QA_FAIL_LABEL,
          ];

          for (const name of labels) {
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name,
              });
              core.info(`Removed label '${name}'.`);
            } catch (err) {
              if (err.status === 404 || err.status === 422) {
                core.info(`Label '${name}' not present; skipping.`);
              } else {
                throw err;
              }
            }
          }

    - name: Publish review
      id: publish
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
        PASS_LABEL: ${{ inputs.pass-label }}
        FAIL_LABEL: ${{ inputs.fail-label }}
        CONFIDENCE_THRESHOLD: ${{ steps.pr.outputs.confidence-threshold }}
        CI_SIGNAL: ${{ steps.ci-signal.outputs.signal }}
        UPDATE_PR_BODY: ${{ inputs.update-pr-body }}
        REVIEW_JSON: ${{ steps.review_retry.outputs.structured_output != '' && steps.review_retry.outputs.structured_output || steps.review.outputs.structured_output }}
      with:
        github-token: ${{ steps.identity.outputs.author-token }}
        script: |
          const prNumber = Number(process.env.PR_NUMBER);
          const passLabel = process.env.PASS_LABEL;
          const failLabel = process.env.FAIL_LABEL;
          const confidenceThreshold = Number(process.env.CONFIDENCE_THRESHOLD);
          const ciSignal = process.env.CI_SIGNAL;

          let review;
          try {
            review = JSON.parse(process.env.REVIEW_JSON);
          } catch (err) {
            // Both the review stage and its retry ended without valid
            // structured output (the intermittent claude-code-action miss).
            // Degrade gracefully rather than crashing the job: post an explicit
            // "inconclusive — re-run" review, fail the gate (safe — a review
            // that didn't complete must not read as pass), and set outputs so
            // review-gate sees a non-pass verdict. A re-run usually succeeds.
            core.warning(`Review stage returned no valid structured output after retry: ${err.message}. Publishing an inconclusive result.`);
            const inconclusiveBody = [
              "<!-- ai-review -->",
              "### ⚠️ AI Review — inconclusive (re-run required)",
              "",
              "The review model did not return a structured result after two",
              "attempts (a known intermittent `anthropics/claude-code-action`",
              "issue). This is **not** a code-quality judgment — the review did",
              "not complete.",
              "",
              "**Re-run the `ai-review` job** to get a verdict.",
            ].join("\n");
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: "REQUEST_CHANGES",
                body: inconclusiveBody,
              });
            } catch (e) {
              core.warning(`Could not post inconclusive review: ${e.message}`);
            }
            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                labels: [failLabel],
              });
            } catch (e) {
              if (![404, 422].includes(e.status)) core.warning(e.message);
            }
            core.setOutput("verdict", "fail");
            core.setOutput("confidence", "0");
            core.setOutput("merge_risk", "high");
            core.setOutput("review_event", "REQUEST_CHANGES");
            return;
          }

          const counts = review.counts || {};
          const p0 = Number(counts.p0) || 0;
          const p1 = Number(counts.p1) || 0;
          const p2 = Number(counts.p2) || 0;
          const p3 = Number(counts.p3) || 0;

          let confidence = 100 - 30 * p0 - 15 * p1 - 5 * p2;

          // Test-quality adjustment (rubric.md "Confidence Rate Calculation").
          // no_tests_for_changed_logic and coverage_below_threshold_on_critical_paths
          // both describe "tests are inadequate" at different severities, so only the
          // worse of the two applies; tests_failing is an independent, stackable
          // penalty (a PR can have adequate but currently-failing tests).
          if (review.no_tests_for_changed_logic) {
            confidence -= 15;
          } else if (review.coverage_below_threshold_on_critical_paths) {
            confidence -= 5;
          }
          // Real test execution (test_execution) supersedes the static
          // tests_failing guess: a command that actually exited non-zero is a
          // definitive failure. And a "passed" claim with no cited
          // command+output in verification_evidence is unverified per
          // /verification-before-completion, so it earns the same penalty as a
          // failing suite rather than a free pass ("evidence before claims").
          const testExecution = review.test_execution || "";
          const verificationEvidence = Array.isArray(review.verification_evidence)
            ? review.verification_evidence
            : [];
          const testsFailing = review.tests_failing === true || testExecution === "failed";
          if (testsFailing) {
            confidence -= 10;
          }
          if (testExecution === "passed" && verificationEvidence.length === 0) {
            confidence -= 10;
          }

          confidence = Math.max(0, Math.min(100, confidence));

          // A completed failing/timed-out required-check conclusion (only available on
          // a workflow_dispatch re-review — see the ci-signal step) is treated as an
          // automatic fail, matching the rubric's "failing required CI = auto-P0" rule.
          const ciFailed = ciSignal === "fail" || ciSignal === "timeout";

          let pass = confidence >= confidenceThreshold && p0 === 0 && p1 === 0 && !ciFailed;

          const intentDeviated = review.intent === "deviated";
          if (intentDeviated) {
            pass = false;
          }

          const verdict = pass ? "pass" : "fail";
          const reviewEvent = pass ? "APPROVE" : "REQUEST_CHANGES";

          let mergeRisk;
          if (p0 > 0 || p1 > 2) {
            mergeRisk = "high";
          } else if (p1 >= 1 || confidence < 70) {
            mergeRisk = "medium";
          } else {
            mergeRisk = "low";
          }

          const verdictLine = verdict === "pass" ? "**✅ PASS**" : "**❌ FAIL**";
          const rejectedBanner = intentDeviated ? "❌ **Rejected — wrong solution**\n\n" : "";
          const mismatchNote =
            review.verdict && review.verdict !== verdict
              ? `\n> ⚠️ Deterministic recomputation (**${verdict}**) overrides the model's self-reported verdict (**${review.verdict}**).\n`
              : "";

          // The review-stage prompt instructs the model not to prepend its own
          // verdict token / confidence-merge-risk line / HTML marker to
          // comment_markdown (this step owns that banner), but model
          // instruction-following is not guaranteed — strip any leading copy of
          // those artifacts defensively so a non-compliant response can't
          // duplicate the banner above it.
          function stripLeadingBannerArtifacts(markdown) {
            if (!markdown) return markdown;
            const verdictTokenRe = /^\*\*(?:✅ PASS|❌ FAIL)\*\*\s*$/;
            const confidenceLineRe = /^Confidence:\s*\d+\s*·\s*Merge risk:\s*\S+\s*$/i;
            const htmlCommentRe = /^<!--.*-->\s*$/;
            const lines = markdown.split("\n");
            let start = 0;
            while (start < lines.length) {
              const line = lines[start];
              if (
                line.trim() === "" ||
                verdictTokenRe.test(line) ||
                confidenceLineRe.test(line) ||
                htmlCommentRe.test(line)
              ) {
                start += 1;
                continue;
              }
              break;
            }
            return lines.slice(start).join("\n");
          }

          const commentBody = stripLeadingBannerArtifacts(review.comment_markdown);

          const body = [
            "<!-- ai-review -->",
            `${rejectedBanner}${verdictLine}`,
            ...(mismatchNote ? [mismatchNote] : []),
            "",
            `Confidence: ${confidence} · Merge risk: ${mergeRisk}`,
            "",
            commentBody || "_No review content returned._",
          ].join("\n");

          await github.rest.pulls.createReview({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: prNumber,
            event: reviewEvent,
            body,
          });

          const winnerLabel = verdict === "pass" ? passLabel : failLabel;
          const loserLabel = verdict === "pass" ? failLabel : passLabel;

          await github.rest.issues.addLabels({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            labels: [winnerLabel],
          });

          try {
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              name: loserLabel,
            });
          } catch (err) {
            if (err.status === 404 || err.status === 422) {
              core.info(`Label '${loserLabel}' not present; skipping.`);
            } else {
              throw err;
            }
          }

          // --- PR-body checklist verification (feature: update PR body) ------
          // Reflect verified checklist items back into the PR description: tick
          // boxes the model VERIFIED (with evidence) in place, and maintain a
          // managed <!-- ai-review-status --> block with per-item status +
          // evidence. Never unticks a human-checked box; never fails the job on
          // error. Gated by the update-pr-body input. The PR body is re-fetched
          // immediately before writing to minimize races with human edits.
          if (
            process.env.UPDATE_PR_BODY === "true" &&
            Array.isArray(review.checklist) &&
            review.checklist.length > 0
          ) {
            try {
              const { data: prData } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              const originalBody = prData.body || "";

              const norm = (s) =>
                (s || "")
                  .toLowerCase()
                  .replace(/[`*_~]/g, "")
                  .replace(/\s+/g, " ")
                  .replace(/[.:;,\s]+$/, "")
                  .trim();
              const verifiedNorms = new Set(
                review.checklist
                  .filter((i) => i && i.status === "verified" && i.text)
                  .map((i) => norm(i.text))
              );

              // Tick matching UNCHECKED boxes only; never untick a human's box.
              const checkboxRe = /^(\s*[-*]\s*)\[ \](\s*)(.+)$/;
              let ticks = 0;
              let newBody = originalBody
                .split("\n")
                .map((line) => {
                  const m = line.match(checkboxRe);
                  if (m && verifiedNorms.has(norm(m[3]))) {
                    ticks += 1;
                    return `${m[1]}[x]${m[2]}${m[3]}`;
                  }
                  return line;
                })
                .join("\n");

              // Build/refresh the managed status block.
              const icon = (s) =>
                s === "verified" ? "✅" : s === "failed" ? "❌" : "❔";
              const itemLines = review.checklist
                .filter((i) => i && i.text)
                .map(
                  (i) =>
                    `- ${icon(i.status)} ${i.text}${i.evidence ? ` — ${i.evidence}` : ""}`
                );
              const evLines = verificationEvidence
                .filter((e) => e && e.command)
                .map((e) => `- \`${e.command}\`${e.result ? ` → ${e.result}` : ""}`);
              const START = "<!-- ai-review-status -->";
              const END = "<!-- /ai-review-status -->";
              const blockParts = [
                START,
                "#### 🤖 AI Review — checklist verification",
                ...itemLines,
              ];
              if (evLines.length) {
                blockParts.push("", "_Verification evidence:_", ...evLines);
              }
              blockParts.push(
                "",
                `_Last updated by ai-review · verdict: ${verdict}._`,
                END
              );
              const block = blockParts.join("\n");

              const blockRe = new RegExp(`${START}[\\s\\S]*?${END}`);
              if (blockRe.test(newBody)) {
                newBody = newBody.replace(blockRe, block);
              } else {
                newBody = `${newBody.replace(/\s*$/, "")}\n\n${block}\n`;
              }

              if (newBody !== originalBody) {
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  body: newBody,
                });
                core.info(
                  `Updated PR body (ticked ${ticks} checkbox(es), refreshed status block).`
                );
              } else {
                core.info("PR body already current; no change.");
              }
            } catch (err) {
              core.warning(`Could not update PR body: ${err.message}`);
            }
          }

          core.setOutput("verdict", verdict);
          core.setOutput("confidence", String(confidence));
          core.setOutput("merge_risk", mergeRisk);
          core.setOutput("review_event", reviewEvent);
