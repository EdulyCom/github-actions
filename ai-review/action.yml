name: ai-review
description: >
  Runs the CI-native AI review gate against a pull request: authors a
  native GitHub PR review (APPROVE / REQUEST_CHANGES) and a pass/fail
  label, then exposes the verdict as a job output
  (`verdict`/`confidence`/`merge_risk`/`review_event`) a consumer's own CI
  reads to gate its heavier build/test/deploy lanes. See
  docs/adr/0001-ci-native-ai-review-gate.md for why the gate is an ordinary
  job output rather than an identity-pinned Check Run, and why the review
  identity is cosmetic. The verdict is produced by a real two-stage AI
  review pipeline: a Haiku context stage summarizes the diff, then a
  diff-size-routed Sonnet/Opus review stage performs the full rubric scan
  and returns a schema-validated result that a deterministic step
  recomputes the pass/fail decision from.

inputs:
  app-id:
    description: >
      GitHub App ID. Optional — when supplied together with `private-key`,
      the review and labels are authored under that App's own slug
      (`<app-slug>[bot]`) instead of `github-actions[bot]`. Purely a
      cosmetic identity choice; never a gate input. See ADR 0001 (b).
    required: false
  private-key:
    description: >
      GitHub App private key, paired with `app-id`. A token is minted for
      this job only, scoped to `pull-requests: write`, `issues: write`, and
      `checks: read` (never the installation's full permission set).
    required: false
  github-token:
    description: >
      Fallback token used to call the GitHub REST API when `app-id` /
      `private-key` are not set. Defaults to the calling workflow's own
      GITHUB_TOKEN; override only if the caller needs a different identity
      or scope. Also used directly (regardless of whether `app-id` /
      `private-key` are set) by the read-only Context stage, which never
      needs the App-minted write-scoped identity.
    required: false
    default: ${{ github.token }}
  pr-number:
    description: >
      Pull request number to review. Optional — defaults to the
      triggering event's `pull_request.number`. Required when the caller
      workflow is invoked via `workflow_dispatch` (e.g. a maintainer
      manually reviewing a fork PR).
    required: false
  pass-label:
    description: Label applied to the PR when the review verdict is a pass.
    required: false
    default: "✓ /ai-review"
  fail-label:
    description: Label applied to the PR when the review verdict is a fail.
    required: false
    default: "✗ /ai-review"
  qa-pass-label:
    description: >
      Post-merge `ai-qa` pass label. This action clears it (does not
      apply it) on every new commit so a stale QA badge from a prior
      commit doesn't linger on the PR.
    required: false
    default: "✓ /ai-qa"
  qa-fail-label:
    description: >
      Post-merge `ai-qa` fail label. This action clears it (does not
      apply it) on every new commit, for the same reason as
      `qa-pass-label`.
    required: false
    default: "✗ /ai-qa"
  confidence-threshold:
    description: >
      Minimum confidence (0-100) required for a pass verdict. Consumed by
      the deterministic Publish review step, which recomputes confidence
      from the review stage's reported P0-P3 counts and test-quality
      signals and compares it against this threshold.
    required: false
    default: "90"
  sonnet-model:
    description: >
      Model ID used by the diff-size routing step for small diffs (≤15
      files and ≤400 changed lines). Consumed by the routing step, whose
      output feeds the Review stage (Sonnet/Opus) as the model to run.
      Override when a gateway aliases model names.
    required: false
    default: "claude-sonnet-5"
  opus-model:
    description: >
      Model ID used by the diff-size routing step for large diffs (>15
      files or >400 changed lines). Consumed by the routing step, whose
      output feeds the Review stage (Sonnet/Opus) as the model to run.
      Override when a gateway aliases model names.
    required: false
    default: "claude-opus-4-8"
  haiku-model:
    description: >
      Model ID used by the context stage (this phase) to read the diff and changed
      files and write context.md for the review stage to consume. Override when a
      gateway aliases model names.
    required: false
    default: "claude-haiku-4-5-20251001"
  anthropic-api-key:
    description: >
      Anthropic API key, sent as the `x-api-key` header. Mutually exclusive with
      `anthropic-auth-token` — supply exactly one. Required for both the Context stage
      and the Review stage (Sonnet/Opus) to call the Anthropic API.
    required: false
  anthropic-auth-token:
    description: >
      Anthropic bearer token (`Authorization: Bearer …`), for gateways that
      authenticate this way instead of an API key. Mutually exclusive with
      `anthropic-api-key` — supply exactly one. Internally, this value is also passed
      as a fallback `anthropic_api_key` to the context stage due to an upstream
      validation gap (anthropics/claude-code-action#1294).
    required: false
  anthropic-base-url:
    description: >
      Optional override for the Anthropic API base URL (e.g. a caller's custom
      gateway). When omitted, the standard Anthropic endpoint is used.
    required: false

outputs:
  verdict:
    description: "'pass' or 'fail'. Empty when the review was skipped (fork PR, draft, or closed)."
    value: ${{ steps.publish.outputs.verdict }}
  confidence:
    description: "Confidence score, 0-100."
    value: ${{ steps.publish.outputs.confidence }}
  merge_risk:
    description: "'low', 'medium', or 'high'."
    value: ${{ steps.publish.outputs.merge_risk }}
  review_event:
    description: "GitHub review event posted: APPROVE or REQUEST_CHANGES."
    value: ${{ steps.publish.outputs.review_event }}

runs:
  using: composite
  steps:
    - name: Author token
      id: author
      if: inputs.app-id != '' && inputs.private-key != ''
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        permission-pull-requests: write
        permission-issues: write
        permission-checks: read

    - name: Resolve author identity
      id: identity
      shell: bash
      env:
        APP_TOKEN: ${{ steps.author.outputs.token }}
        APP_SLUG: ${{ steps.author.outputs.app-slug }}
        FALLBACK_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        if [ -n "${APP_TOKEN}" ]; then
          echo "::add-mask::${APP_TOKEN}"
          {
            echo "author-token=${APP_TOKEN}"
            echo "author-login=${APP_SLUG}[bot]"
          } >> "${GITHUB_OUTPUT}"
        else
          echo "::add-mask::${FALLBACK_TOKEN}"
          {
            echo "author-token=${FALLBACK_TOKEN}"
            echo "author-login=github-actions[bot]"
          } >> "${GITHUB_OUTPUT}"
        fi

    - name: Resolve PR number
      id: pr
      shell: bash
      env:
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        set -euo pipefail
        PR_NUMBER="${INPUT_PR_NUMBER:-${EVENT_PR_NUMBER}}"
        if [ -z "${PR_NUMBER}" ]; then
          echo "::error::No pr-number input and no pull_request event payload; nothing to review."
          exit 1
        fi
        echo "pr-number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"

    - name: Fork guard
      id: fork-guard
      shell: bash
      env:
        EVENT_NAME: ${{ github.event_name }}
        HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        BASE_REPO: ${{ github.event.pull_request.base.repo.full_name }}
      run: |
        set -euo pipefail
        if [ "${EVENT_NAME}" = "pull_request" ] && [ -n "${HEAD_REPO}" ] && [ -n "${BASE_REPO}" ] && [ "${HEAD_REPO}" != "${BASE_REPO}" ]; then
          echo "::notice::skipped — fork; maintainer can workflow_dispatch"
          echo "is-fork=true" >> "${GITHUB_OUTPUT}"
        else
          echo "is-fork=false" >> "${GITHUB_OUTPUT}"
        fi

    - name: Clear stale labels on new commit
      id: stale-clear
      if: steps.fork-guard.outputs.is-fork != 'true' && github.event.action == 'synchronize'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
        PASS_LABEL: ${{ inputs.pass-label }}
        FAIL_LABEL: ${{ inputs.fail-label }}
        QA_PASS_LABEL: ${{ inputs.qa-pass-label }}
        QA_FAIL_LABEL: ${{ inputs.qa-fail-label }}
      with:
        github-token: ${{ steps.identity.outputs.author-token }}
        script: |
          const prNumber = Number(process.env.PR_NUMBER);
          const labels = [
            process.env.PASS_LABEL,
            process.env.FAIL_LABEL,
            process.env.QA_PASS_LABEL,
            process.env.QA_FAIL_LABEL,
          ];

          for (const name of labels) {
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name,
              });
              core.info(`Removed stale label '${name}'.`);
            } catch (err) {
              if (err.status === 404 || err.status === 422) {
                core.info(`Label '${name}' not present; skipping.`);
              } else {
                throw err;
              }
            }
          }

    - name: Draft/closed gate
      id: pr-state
      if: steps.fork-guard.outputs.is-fork != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.identity.outputs.author-token }}
        PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
        REPO: ${{ github.repository }}
      run: |
        set -euo pipefail
        STATE_JSON="$(gh pr view "${PR_NUMBER}" --repo "${REPO}" --json isDraft,state,baseRefName,headRefOid)"
        IS_DRAFT="$(echo "${STATE_JSON}" | jq -r '.isDraft')"
        STATE="$(echo "${STATE_JSON}" | jq -r '.state')"
        BASE_REF="$(echo "${STATE_JSON}" | jq -r '.baseRefName')"
        HEAD_SHA="$(echo "${STATE_JSON}" | jq -r '.headRefOid')"
        {
          echo "base-ref=${BASE_REF}"
          echo "head-sha=${HEAD_SHA}"
        } >> "${GITHUB_OUTPUT}"
        if [ "${IS_DRAFT}" = "true" ] || [ "${STATE}" = "CLOSED" ] || [ "${STATE}" = "MERGED" ]; then
          echo "::notice::skipped — PR is draft or closed"
          echo "skip=true" >> "${GITHUB_OUTPUT}"
        else
          echo "skip=false" >> "${GITHUB_OUTPUT}"
        fi

    - name: Check out PR head
      id: checkout
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ steps.pr-state.outputs.head-sha }}
        fetch-depth: 0
        persist-credentials: false

    - name: Compute diff stats and route model
      id: route
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true'
      shell: bash
      env:
        BASE_REF: ${{ steps.pr-state.outputs.base-ref }}
        SONNET: ${{ inputs.sonnet-model }}
        OPUS: ${{ inputs.opus-model }}
      run: |
        set -euo pipefail
        NUMSTAT="$(git diff --numstat "origin/${BASE_REF}...HEAD")"
        if [ -z "${NUMSTAT}" ]; then
          FILES=0
          CHURN=0
        else
          FILES="$(printf '%s\n' "${NUMSTAT}" | wc -l | tr -d ' ')"
          # Binary-file numstat rows report "-" for added/removed instead of a
          # number (e.g. "-\t-\tpath"); awk coerces non-numeric fields to 0,
          # so binary churn is intentionally counted as 0 here. This is an
          # accepted limitation matching the task brief's own formula, not a
          # bug — do not re-flag it.
          CHURN="$(printf '%s\n' "${NUMSTAT}" | awk '{a+=$1; r+=$2} END {print a+r+0}')"
        fi
        if [ "${FILES}" -le 15 ] && [ "${CHURN}" -le 400 ]; then
          MODEL="${SONNET:-claude-sonnet-5}"
        else
          MODEL="${OPUS:-claude-opus-4-8}"
        fi
        {
          echo "files=${FILES}"
          echo "churn=${CHURN}"
          echo "model=${MODEL}"
        } >> "${GITHUB_OUTPUT}"

    - name: Context stage (Haiku)
      id: context
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true'
      uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1.0.177
      # This action version rejects ANTHROPIC_AUTH_TOKEN alone (anthropics/claude-code-action#1294),
      # so the bearer token also fills anthropic_api_key to pass validation, while
      # ANTHROPIC_CUSTOM_HEADERS carries the real bearer credential used on the wire.
      env:
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic-base-url }}
        ANTHROPIC_CUSTOM_HEADERS: "${{ inputs.anthropic-auth-token != '' && format('Authorization: Bearer {0}', inputs.anthropic-auth-token) || '' }}"
      with:
        anthropic_api_key: ${{ inputs.anthropic-api-key != '' && inputs.anthropic-api-key || inputs.anthropic-auth-token }}
        # Deliberately NOT steps.identity.outputs.author-token: this stage only
        # reads the local working tree and writes context.md, so it gets the
        # unprivileged fallback token rather than the App-minted
        # pull-requests/issues/checks-scoped identity used by the publishing
        # steps later in this action.
        github_token: ${{ inputs.github-token }}
        claude_args: --model ${{ inputs.haiku-model }}
        prompt: |
          Read the PR diff (the working tree is already checked out at the PR head
          commit; diff it against the merge-base with the repository's default
          branch — discover the default branch yourself, e.g. via `git remote show
          origin` or `git symbolic-ref refs/remotes/origin/HEAD`, if you need it) and
          the full contents of every changed file. Grep the repository for callers,
          callees, and helper functions related to the changed code, so a reviewer
          has the surrounding context without re-deriving it.

          Write a concise summary to `context.md` at the repository root covering:
          - what changed, in plain language
          - which files/functions call into or are called by the changed code
          - any related helpers, shared utilities, or patterns the changed code
            reuses or should have reused

          Do NOT review the change. Do NOT judge correctness, quality, or security.
          Do NOT produce a verdict, opinion, or recommendation of any kind. Your only
          output is the factual context.md summary — a later stage does the review.

    - name: CI signal (re-review only)
      id: ci-signal
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.identity.outputs.author-token }}
        EVENT_NAME: ${{ github.event_name }}
        REPO: ${{ github.repository }}
        HEAD_SHA: ${{ steps.pr-state.outputs.head-sha }}
      run: |
        # Best-effort only — this step must never hard-fail the job, so it
        # deliberately omits `set -e`. A normal pull_request run is the
        # *first* CI job: no required check has a completed conclusion yet,
        # so a real CI signal only exists on a manual workflow_dispatch
        # re-review, after CI has already run once.
        set -uo pipefail
        SIGNAL="no_ci"
        if [ "${EVENT_NAME}" = "workflow_dispatch" ]; then
          CHECK_RUNS="$(gh api "repos/${REPO}/commits/${HEAD_SHA}/check-runs" --jq '.check_runs' 2>/dev/null)"
          if [ -n "${CHECK_RUNS}" ] && [ "${CHECK_RUNS}" != "[]" ] && [ "${CHECK_RUNS}" != "null" ]; then
            # If any returned check-run has not yet reached "completed"
            # (queued/in_progress), the signal is inconclusive — never guess
            # a pass/fail from a partial subset of still-running checks.
            if echo "${CHECK_RUNS}" | jq -e 'any(.[]; .status != "completed")' >/dev/null 2>&1; then
              SIGNAL="no_ci"
            else
              CONCLUSIONS="$(echo "${CHECK_RUNS}" | jq '[.[] | .conclusion]')"
              if echo "${CONCLUSIONS}" | jq -e 'any(.[]; . == "timed_out")' >/dev/null 2>&1; then
                SIGNAL="timeout"
              elif echo "${CONCLUSIONS}" | jq -e 'any(.[]; . == "failure" or . == "cancelled" or . == "action_required")' >/dev/null 2>&1; then
                SIGNAL="fail"
              elif echo "${CONCLUSIONS}" | jq -e 'all(.[]; . == "success" or . == "neutral" or . == "skipped")' >/dev/null 2>&1; then
                SIGNAL="pass"
              fi
            fi
          fi
        fi
        echo "signal=${SIGNAL}" >> "${GITHUB_OUTPUT}"

    - name: Review stage (Sonnet/Opus)
      id: review
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true'
      uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1.0.177
      # Same anthropics/claude-code-action#1294 workaround as the Context stage above:
      # this action version rejects ANTHROPIC_AUTH_TOKEN alone, so the bearer token also
      # fills anthropic_api_key to pass validation, while ANTHROPIC_CUSTOM_HEADERS carries
      # the real bearer credential on the wire.
      env:
        ANTHROPIC_BASE_URL: ${{ inputs.anthropic-base-url }}
        ANTHROPIC_CUSTOM_HEADERS: "${{ inputs.anthropic-auth-token != '' && format('Authorization: Bearer {0}', inputs.anthropic-auth-token) || '' }}"
        PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
      with:
        anthropic_api_key: ${{ inputs.anthropic-api-key != '' && inputs.anthropic-api-key || inputs.anthropic-auth-token }}
        # Deliberately NOT steps.identity.outputs.author-token, for the same
        # least-privilege reason as the Context stage: this step only reads the
        # repo, calls the Anthropic API, and returns structured output — it
        # never calls the GitHub API to post anything. The App-minted identity
        # is reserved for the deterministic Publish review step below.
        github_token: ${{ inputs.github-token }}
        plugins: superpowers@superpowers-marketplace
        plugin_marketplaces: https://github.com/obra/superpowers-marketplace.git
        claude_args: |
          --model ${{ steps.route.outputs.model }}
          --allowedTools "Bash(gh pr view:*),Bash(git diff:*),Bash(git symbolic-ref:*),Bash(git merge-base:*),Bash(git remote show:*),Bash(git log:*),Bash(git show:*)"
          --json-schema '{"type":"object","additionalProperties":false,"required":["verdict","confidence","merge_risk","intent","counts","review_event","comment_markdown"],"properties":{"verdict":{"type":"string","enum":["pass","fail"]},"confidence":{"type":"integer","minimum":0,"maximum":100},"merge_risk":{"type":"string","enum":["low","med","high"]},"intent":{"type":"string","enum":["aligned","partial","deviated","skipped"]},"counts":{"type":"object","additionalProperties":false,"required":["p0","p1","p2","p3"],"properties":{"p0":{"type":"integer","minimum":0},"p1":{"type":"integer","minimum":0},"p2":{"type":"integer","minimum":0},"p3":{"type":"integer","minimum":0}}},"review_event":{"type":"string","enum":["APPROVE","REQUEST_CHANGES"]},"comment_markdown":{"type":"string"},"tests_failing":{"type":"boolean"},"coverage_below_threshold_on_critical_paths":{"type":"boolean"},"no_tests_for_changed_logic":{"type":"boolean"}}}'
        prompt: |
          You are performing an automated code review. Attempt to load the
          live `/requesting-code-review` skill if the superpowers plugin
          installed successfully; if it is unavailable, proceed without it —
          do not fail or block on a missing plugin.

          Read `ai-review/rubric.md` at the repository root. This is the
          authoritative review methodology: an 8-angle scan (intent alignment
          first, then line-by-line diff, removed-behavior audit, cross-file
          tracing, reuse, simplification, efficiency, altitude), a severity
          scale (P0-P3), and a full review checklist. Follow it.

          The PR number is available in the `PR_NUMBER` environment variable.
          Run `gh pr view "$PR_NUMBER" --json title,body,url,number` (and
          follow any linked issue reference in the body) to establish the
          stated goal for the rubric's Angle H (Intent alignment) — do this
          before analyzing the diff, per the rubric's Angle H methodology
          (frame-setting must happen before code analysis, not after).

          Read `context.md` at the repository root (written by an earlier
          context-gathering stage) for a summary of what changed and its
          callers/callees/related helpers.

          Read the PR diff yourself: the working tree is already checked out
          at the PR head commit; diff it against the merge-base with the
          repository's default branch (discover the default branch yourself,
          e.g. via `git symbolic-ref refs/remotes/origin/HEAD`).

          Perform the full 8-angle scan from the rubric against the diff.
          Classify every confirmed or plausible finding into P0/P1/P2/P3 per
          the rubric's severity definitions, and count them.

          Also assess test quality per the rubric's Testing section: are
          there tests for the changed logic (`no_tests_for_changed_logic`),
          is coverage on critical paths below target
          (`coverage_below_threshold_on_critical_paths`), and are any tests
          failing (`tests_failing`)? Report these as three booleans; omit any
          you cannot assess rather than guessing.

          Write a complete review as `comment_markdown`: findings grouped by
          severity (P0 Blockers, P1 Should Fix, P2 Nice-to-Have, P3 Nits —
          state "_None._" for empty sections), strengths, and a leading bold
          verdict token literally `**✅ PASS**` or `**❌ FAIL**` matching your
          own `verdict` field. Do not include any HTML marker comment in
          `comment_markdown` — the caller adds one separately.

          Return your full assessment via the required structured output
          schema. `counts` must be accurate — a later deterministic step
          recomputes the actual pass/fail decision from `counts` alone and
          does not trust your `verdict` field; report it anyway as your own
          best assessment.

    - name: Reset prior review and labels
      id: reset
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
        AUTHOR_LOGIN: ${{ steps.identity.outputs.author-login }}
        PASS_LABEL: ${{ inputs.pass-label }}
        FAIL_LABEL: ${{ inputs.fail-label }}
        QA_PASS_LABEL: ${{ inputs.qa-pass-label }}
        QA_FAIL_LABEL: ${{ inputs.qa-fail-label }}
      with:
        github-token: ${{ steps.identity.outputs.author-token }}
        script: |
          const prNumber = Number(process.env.PR_NUMBER);
          const authorLogin = process.env.AUTHOR_LOGIN;

          const { data: reviews } = await github.rest.pulls.listReviews({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: prNumber,
          });

          // dismissReview only accepts APPROVED or CHANGES_REQUESTED reviews
          // (a COMMENTED review throws a 422) — filter before calling it, and
          // still wrap the call defensively in case of a race.
          const dismissible = reviews.filter(
            (review) =>
              review.user?.login === authorLogin &&
              (review.state === "APPROVED" || review.state === "CHANGES_REQUESTED"),
          );

          for (const review of dismissible) {
            try {
              await github.rest.pulls.dismissReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                review_id: review.id,
                message: "Superseded by a new ai-review run.",
              });
              core.info(`Dismissed prior review #${review.id} by '${authorLogin}'.`);
            } catch (err) {
              if (err.status === 404 || err.status === 422) {
                core.info(`Review #${review.id} could not be dismissed; skipping.`);
              } else {
                throw err;
              }
            }
          }

          const labels = [
            process.env.PASS_LABEL,
            process.env.FAIL_LABEL,
            process.env.QA_PASS_LABEL,
            process.env.QA_FAIL_LABEL,
          ];

          for (const name of labels) {
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                name,
              });
              core.info(`Removed label '${name}'.`);
            } catch (err) {
              if (err.status === 404 || err.status === 422) {
                core.info(`Label '${name}' not present; skipping.`);
              } else {
                throw err;
              }
            }
          }

    - name: Publish review
      id: publish
      if: steps.fork-guard.outputs.is-fork != 'true' && steps.pr-state.outputs.skip != 'true'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        PR_NUMBER: ${{ steps.pr.outputs.pr-number }}
        PASS_LABEL: ${{ inputs.pass-label }}
        FAIL_LABEL: ${{ inputs.fail-label }}
        CONFIDENCE_THRESHOLD: ${{ inputs.confidence-threshold }}
        CI_SIGNAL: ${{ steps.ci-signal.outputs.signal }}
        REVIEW_JSON: ${{ steps.review.outputs.structured_output }}
      with:
        github-token: ${{ steps.identity.outputs.author-token }}
        script: |
          const prNumber = Number(process.env.PR_NUMBER);
          const passLabel = process.env.PASS_LABEL;
          const failLabel = process.env.FAIL_LABEL;
          const confidenceThreshold = Number(process.env.CONFIDENCE_THRESHOLD);
          const ciSignal = process.env.CI_SIGNAL;

          let review;
          try {
            review = JSON.parse(process.env.REVIEW_JSON);
          } catch (err) {
            core.setFailed(`Review stage did not return valid structured output: ${err.message}`);
            return;
          }

          const counts = review.counts || {};
          const p0 = Number(counts.p0) || 0;
          const p1 = Number(counts.p1) || 0;
          const p2 = Number(counts.p2) || 0;
          const p3 = Number(counts.p3) || 0;

          let confidence = 100 - 30 * p0 - 15 * p1 - 5 * p2;

          // Test-quality adjustment (rubric.md "Confidence Rate Calculation").
          // no_tests_for_changed_logic and coverage_below_threshold_on_critical_paths
          // both describe "tests are inadequate" at different severities, so only the
          // worse of the two applies; tests_failing is an independent, stackable
          // penalty (a PR can have adequate but currently-failing tests).
          if (review.no_tests_for_changed_logic) {
            confidence -= 15;
          } else if (review.coverage_below_threshold_on_critical_paths) {
            confidence -= 5;
          }
          if (review.tests_failing) {
            confidence -= 10;
          }

          confidence = Math.max(0, Math.min(100, confidence));

          // A completed failing/timed-out required-check conclusion (only available on
          // a workflow_dispatch re-review — see the ci-signal step) is treated as an
          // automatic fail, matching the rubric's "failing required CI = auto-P0" rule.
          const ciFailed = ciSignal === "fail" || ciSignal === "timeout";

          let pass = confidence >= confidenceThreshold && p0 === 0 && p1 === 0 && !ciFailed;

          const intentDeviated = review.intent === "deviated";
          if (intentDeviated) {
            pass = false;
          }

          const verdict = pass ? "pass" : "fail";
          const reviewEvent = pass ? "APPROVE" : "REQUEST_CHANGES";

          let mergeRisk;
          if (p0 > 0 || p1 > 2) {
            mergeRisk = "high";
          } else if (p1 >= 1 || confidence < 70) {
            mergeRisk = "medium";
          } else {
            mergeRisk = "low";
          }

          const verdictLine = verdict === "pass" ? "**✅ PASS**" : "**❌ FAIL**";
          const rejectedBanner = intentDeviated ? "❌ **Rejected — wrong solution**\n\n" : "";
          const mismatchNote =
            review.verdict && review.verdict !== verdict
              ? `\n> ⚠️ Deterministic recomputation (**${verdict}**) overrides the model's self-reported verdict (**${review.verdict}**).\n`
              : "";

          const body = [
            "<!-- ai-review -->",
            `${rejectedBanner}${verdictLine}`,
            ...(mismatchNote ? [mismatchNote] : []),
            "",
            `Confidence: ${confidence} · Merge risk: ${mergeRisk}`,
            "",
            review.comment_markdown || "_No review content returned._",
          ].join("\n");

          await github.rest.pulls.createReview({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: prNumber,
            event: reviewEvent,
            body,
          });

          const winnerLabel = verdict === "pass" ? passLabel : failLabel;
          const loserLabel = verdict === "pass" ? failLabel : passLabel;

          await github.rest.issues.addLabels({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            labels: [winnerLabel],
          });

          try {
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              name: loserLabel,
            });
          } catch (err) {
            if (err.status === 404 || err.status === 422) {
              core.info(`Label '${loserLabel}' not present; skipping.`);
            } else {
              throw err;
            }
          }

          core.setOutput("verdict", verdict);
          core.setOutput("confidence", String(confidence));
          core.setOutput("merge_risk", mergeRisk);
          core.setOutput("review_event", reviewEvent);
