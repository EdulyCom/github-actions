name: ai-qa
description: >-
  Post-merge, non-blocking QA signal. Runs after a push to the default branch:
  resolves the pull request that was just merged, waits for the deploy to
  become healthy, then has Claude perform a real agentic post-merge QA
  review — smoke-testing the deployed app, reviewing the merged diff for
  integration/runtime risks, and (at its own discretion) running the repo's
  build/tests to confirm a suspected regression — and emits a P0–P3 verdict.
  A deterministic step recomputes the pass/fail decision from the severity
  counts and the deploy-health signal, then posts a report comment and a
  pass/fail label on the merged PR. This action is informational only — it has
  no `outputs:` block, never calls the Checks API, and gates nothing in the
  calling workflow.

inputs:
  app-id:
    description: >-
      GitHub App ID. Optional — with `private-key`, the report comment and
      label are authored as `<app-slug>[bot]` instead of
      `github-actions[bot]`. Cosmetic only; see ADR 0001 (b).
    required: false
  private-key:
    description: GitHub App private key, paired with `app-id`.
    required: false
  github-token:
    description: >-
      Fallback token used when `app-id`/`private-key` are not set, and the
      token the (unprivileged, read-only) QA review step always uses
      regardless of whether an App is configured.
    required: false
    default: ${{ github.token }}
  health-url:
    description: >-
      URL polled with `curl --fail` once every few seconds until it responds
      successfully or `deploy-timeout` elapses. Required — there is no sensible
      generic default for a deployed environment's health endpoint. The QA
      review also smoke-tests this URL (and routes derived from it) directly.
    required: true
  deploy-timeout:
    description: >-
      Seconds to keep polling `health-url` before giving up. Unreachable at the
      deadline counts as an unhealthy deploy (auto-P0 → fail signal).
    required: false
    default: "180"
  test-hint:
    description: >-
      Optional free-text guidance describing how to build/test this repo (e.g.
      "yarn nx run-many -t build,test --exclude=be-e2e"). Handed to the QA
      review as context — Claude MAY run it at its own discretion to confirm a
      suspected regression, but it is NOT run mechanically. The consumer is
      responsible for provisioning the toolchain (Node, etc.) in a prior step
      before this action runs.
    required: false
    default: ""
  qa-model:
    description: >-
      Model used for the agentic post-merge QA review. Defaults to Sonnet;
      override with a repo var if a custom gateway aliases model names.
    required: false
    default: claude-sonnet-5
  allowed-tools:
    description: >-
      Tool allowlist passed to the QA review's `--allowedTools`. The default
      lets Claude read/grep the checked-out code, smoke-test the deploy over
      HTTP (`curl`), inspect the merged diff (`git`), and — at its discretion —
      run a JS/TS toolchain build/test. Override to widen or narrow.
    required: false
    default: >-
      Read,Grep,Glob,Bash(curl:*),Bash(git:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(ls:*),Bash(find:*),Bash(grep:*),Bash(wc:*),Bash(node:*),Bash(npm:*),Bash(npx:*),Bash(yarn:*),Bash(pnpm:*),Bash(corepack:*)
  pass-label:
    description: >-
      Label applied to the merged PR when the overall QA signal (deploy health
      and the review verdict) passes.
    required: false
    default: "✓ /ai-qa"
  fail-label:
    description: >-
      Label applied to the merged PR when the overall QA signal fails.
    required: false
    default: "✗ /ai-qa"
  anthropic-api-key:
    description: >-
      Anthropic API key used by the QA review step. Optional — without a
      credential the review step quietly no-ops and the report comment is still
      published from the deploy-health signal alone. Exactly one of
      `anthropic-api-key`/`anthropic-auth-token` should be supplied when the
      review is wanted.
    required: false
  anthropic-auth-token:
    description: >-
      Bearer token for a custom Anthropic-compatible gateway, used instead of
      `anthropic-api-key`. See the `#1294` workaround comment on the QA review
      step below.
    required: false
  anthropic-base-url:
    description: >-
      Optional custom Anthropic-compatible API base URL (e.g. a corporate
      gateway). Leave unset to use Anthropic's default endpoint.
    required: false
  update-pr-body:
    description: >-
      When 'true' (default), the Publish step maintains a managed
      `<!-- ai-qa-status -->` block in the merged PR's description reflecting
      the latest QA status. Set to 'false' to leave the PR body untouched.
    required: false
    default: "true"
  update-linked-issues:
    description: >-
      When 'true' (default), the Publish step resolves the issues the merged
      PR closed and posts a sticky QA-status comment on each. On a FAIL it
      also reopens a closed linked issue and applies `fail-label`; on a PASS
      it applies `pass-label` and removes `fail-label`. Set to 'false' to
      leave linked issues untouched.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Author token
      id: author
      if: inputs.app-id != '' && inputs.private-key != ''
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        permission-pull-requests: write
        permission-issues: write

    - name: Resolve author identity
      id: identity
      shell: bash
      env:
        APP_TOKEN: ${{ steps.author.outputs.token }}
        APP_SLUG: ${{ steps.author.outputs.app-slug }}
        FALLBACK_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        if [ -n "${APP_TOKEN}" ]; then
          echo "::add-mask::${APP_TOKEN}"
          {
            echo "author-token=${APP_TOKEN}"
            echo "author-login=${APP_SLUG}[bot]"
          } >> "${GITHUB_OUTPUT}"
        else
          echo "::add-mask::${FALLBACK_TOKEN}"
          {
            echo "author-token=${FALLBACK_TOKEN}"
            echo "author-login=github-actions[bot]"
          } >> "${GITHUB_OUTPUT}"
        fi

    - name: Resolve merged PR and merge commit
      id: merge
      shell: bash
      env:
        GH_TOKEN: ${{ steps.identity.outputs.author-token }}
        REPO: ${{ github.repository }}
        MERGE_SHA: ${{ github.sha }}
      run: |
        set -uo pipefail
        PR_NUMBER=""
        for attempt in 1 2 3 4 5; do
          PR_JSON="$(gh api "repos/${REPO}/commits/${MERGE_SHA}/pulls" 2>/dev/null || echo '[]')"
          PR_NUMBER="$(echo "${PR_JSON}" | jq -r '[.[] | select(.merged_at != null)] | sort_by(.merged_at) | last | .number // empty')"
          if [ -n "${PR_NUMBER}" ]; then
            break
          fi
          if [ "${attempt}" -lt 5 ]; then
            sleep 3
          fi
        done
        if [ -z "${PR_NUMBER}" ]; then
          echo "::notice::ai-qa skipped — no merged pull request is associated with commit ${MERGE_SHA} after 5 attempts (a direct push to the default branch, or GitHub has not yet indexed the association)"
          echo "skip=true" >> "${GITHUB_OUTPUT}"
        else
          echo "skip=false" >> "${GITHUB_OUTPUT}"
          echo "pr-number=${PR_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "merge-sha=${MERGE_SHA}" >> "${GITHUB_OUTPUT}"
        fi

    - name: Check out merge commit
      if: steps.merge.outputs.skip != 'true'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        ref: ${{ steps.merge.outputs.merge-sha }}
        # depth 2 so the QA review can diff the merge commit against its first
        # parent (`git diff <sha>^1 <sha>`) — the change that just merged.
        fetch-depth: 2
        persist-credentials: false

    - name: Resolve PR context and linked issues
      id: prcontext
      if: steps.merge.outputs.skip != 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ steps.identity.outputs.author-token }}
        REPO: ${{ github.repository }}
        PR_NUMBER: ${{ steps.merge.outputs.pr-number }}
      run: |
        set -uo pipefail
        # Stage the merged PR's metadata for the QA review + Publish steps:
        #  - .ai-qa/pr-meta.json    → {number,title,body,url} of the merged PR
        #  - .ai-qa/test-plan.md    → the PR body's "Test Plan" section, if any
        #  - .ai-qa/linked-issues.json → issues the PR closed (keywords + graph)
        # Best-effort: every failure degrades to an empty/absent artifact. This
        # resolver + JSON shape is intentionally mirrored from ai-review — keep
        # the two in sync.
        mkdir -p .ai-qa
        printf '{}' > .ai-qa/pr-meta.json
        : > .ai-qa/test-plan.md
        echo '[]' > .ai-qa/linked-issues.json
        if [ -n "${PR_NUMBER}" ]; then
          gh pr view "${PR_NUMBER}" --repo "${REPO}" --json number,title,body,url \
            > .ai-qa/pr-meta.json 2>/dev/null || printf '{}' > .ai-qa/pr-meta.json
          # Extract the "Test Plan" section: from a "# … Test Plan" heading up to
          # the next markdown heading. `#+` (not `#{1,6}`) for mawk portability.
          BODY="$(jq -r '.body // ""' .ai-qa/pr-meta.json 2>/dev/null || echo '')"
          printf '%s\n' "${BODY}" | awk '
            BEGIN { grab = 0 }
            /^[[:space:]]*#+[[:space:]]*[Tt]est[[:space:]]*[Pp]lan/ { grab = 1; next }
            grab == 1 && /^[[:space:]]*#+[[:space:]]/ { grab = 0 }
            grab == 1 { print }
          ' > .ai-qa/test-plan.md
          OWNER="${REPO%%/*}"
          NAME="${REPO##*/}"
          RESP="$(gh api graphql \
            -f query='query($owner:String!,$repo:String!,$pr:Int!){repository(owner:$owner,name:$repo){pullRequest(number:$pr){closingIssuesReferences(first:20){nodes{number title body state url labels(first:20){nodes{name}}}}}}}' \
            -F owner="${OWNER}" -F repo="${NAME}" -F pr="${PR_NUMBER}" 2>/dev/null || echo '')"
          if [ -n "${RESP}" ]; then
            printf '%s' "${RESP}" | jq '[.data.repository.pullRequest.closingIssuesReferences.nodes[] | {number, title, body, state, url, labels: [.labels.nodes[].name]}]' > .ai-qa/linked-issues.json 2>/dev/null || echo '[]' > .ai-qa/linked-issues.json
          fi
        fi
        TP_PRESENT=false
        [ -s .ai-qa/test-plan.md ] && TP_PRESENT=true
        ISSUE_COUNT="$(jq 'length' .ai-qa/linked-issues.json 2>/dev/null || echo 0)"
        {
          echo "test-plan-present=${TP_PRESENT}"
          echo "issue-count=${ISSUE_COUNT}"
        } >> "${GITHUB_OUTPUT}"
        echo "Test plan present: ${TP_PRESENT}; linked issues: ${ISSUE_COUNT}."

    - name: Wait for deploy health
      id: health
      if: steps.merge.outputs.skip != 'true'
      shell: bash
      env:
        HEALTH_URL: ${{ inputs.health-url }}
        DEPLOY_TIMEOUT: ${{ inputs.deploy-timeout }}
      run: |
        set -uo pipefail
        START="$(date +%s)"
        STATUS="timeout"
        while :; do
          if curl --fail --silent --show-error --max-time 10 "${HEALTH_URL}" >/dev/null 2>&1; then
            STATUS="healthy"
            break
          fi
          NOW="$(date +%s)"
          ELAPSED="$(( NOW - START ))"
          if [ "${ELAPSED}" -ge "${DEPLOY_TIMEOUT}" ]; then
            break
          fi
          sleep 5
        done
        echo "status=${STATUS}" >> "${GITHUB_OUTPUT}"
        if [ "${STATUS}" != "healthy" ]; then
          echo "::warning::${HEALTH_URL} did not become healthy within ${DEPLOY_TIMEOUT}s"
        fi

    # The action's own rubric.md lives under $GITHUB_ACTION_PATH (the runner's
    # _actions dir), not in the consumer checkout — copy it into the workspace
    # so the QA review can Read it with a stable relative path.
    - name: Stage QA rubric
      id: prep
      if: steps.merge.outputs.skip != 'true'
      shell: bash
      run: |
        set -euo pipefail
        cp "${GITHUB_ACTION_PATH}/rubric.md" "${GITHUB_WORKSPACE}/.ai-qa-rubric.md"

    # Only set ANTHROPIC_BASE_URL when the caller actually supplied one —
    # setting it to an empty string in the review step's own `env:` would
    # override claude-code-action's/the Anthropic SDK's own default endpoint
    # fallback with `''` instead of leaving the variable absent.
    - name: Set Anthropic base URL (if provided)
      id: anthropic-base-url
      if: inputs.anthropic-base-url != ''
      shell: bash
      env:
        BASE_URL: ${{ inputs.anthropic-base-url }}
      run: | # zizmor: ignore[github-env] BASE_URL is this action's own anthropic-base-url input (caller-supplied static config), never attacker-influenceable event data — see ADR-0010's env-binding rule
        echo "ANTHROPIC_BASE_URL=${BASE_URL}" >> "${GITHUB_ENV}"

    # Workaround for anthropics/claude-code-action#1294: the action requires
    # *some* value in `anthropic_api_key` even when authenticating to a custom
    # gateway via a bearer token, so fall back to the auth token itself and
    # carry the real bearer via a custom header instead.
    - name: Post-merge QA review
      id: review
      continue-on-error: true
      if: >-
        steps.merge.outputs.skip != 'true' &&
        (inputs.anthropic-api-key != '' || inputs.anthropic-auth-token != '')
      uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1.0.177
      env:
        ANTHROPIC_CUSTOM_HEADERS: "${{ inputs.anthropic-auth-token != '' && format('Authorization: Bearer {0}', inputs.anthropic-auth-token) || '' }}"
      with:
        anthropic_api_key: ${{ inputs.anthropic-api-key != '' && inputs.anthropic-api-key || inputs.anthropic-auth-token }}
        github_token: ${{ inputs.github-token }}
        claude_args: |
          --model ${{ inputs.qa-model }}
          --allowedTools "${{ inputs.allowed-tools }}"
          --json-schema '{"type":"object","additionalProperties":false,"required":["verdict","confidence","merge_risk","deploy_status","counts","summary","report_markdown"],"properties":{"verdict":{"type":"string","enum":["pass","fail"]},"confidence":{"type":"integer","minimum":0,"maximum":100},"merge_risk":{"type":"string","enum":["low","medium","high"]},"deploy_status":{"type":"string","enum":["healthy","unhealthy","unknown"]},"counts":{"type":"object","additionalProperties":false,"required":["p0","p1","p2","p3"],"properties":{"p0":{"type":"integer","minimum":0},"p1":{"type":"integer","minimum":0},"p2":{"type":"integer","minimum":0},"p3":{"type":"integer","minimum":0}}},"summary":{"type":"string"},"report_markdown":{"type":"string"},"test_plan":{"type":"object","additionalProperties":false,"required":["present"],"properties":{"present":{"type":"boolean"},"items":{"type":"array","items":{"type":"object","additionalProperties":false,"required":["text","status"],"properties":{"text":{"type":"string"},"status":{"type":"string","enum":["passed","failed","unverifiable"]},"evidence":{"type":"string"}}}}}}}}'
        prompt: |
          You are performing a POST-MERGE QA review of a change that just merged
          to the default branch and deployed. Pre-merge CI already reviewed and
          tested the diff, so your job is to validate the MERGED + DEPLOYED
          state and catch what pre-merge review cannot: a deploy that came up
          broken, runtime regressions, and config/integration drift.

          Read the rubric at `.ai-qa-rubric.md` (in the repo root) first — it
          defines the severities, the deployment gate, the checks to run, and
          the verdict rules. Follow it exactly.

          Context for this run:
          - Merged commit: ${{ steps.merge.outputs.merge-sha }}. The change that
            merged is the first-parent diff of that commit — inspect it with
            `git show ${{ steps.merge.outputs.merge-sha }}` or
            `git diff ${{ steps.merge.outputs.merge-sha }}^1 ${{ steps.merge.outputs.merge-sha }}`.
          - Deploy health signal (already polled by CI): "${{ steps.health.outputs.status }}"
            for ${{ inputs.health-url }} (waited up to ${{ inputs.deploy-timeout }}s).
          - Build/test guidance for this repo (may be empty — run only at your
            discretion to confirm a suspected regression, never as a default):
            ${{ inputs.test-hint }}
          - Merged PR metadata: `.ai-qa/pr-meta.json` ({number,title,body,url}).
          - The PR's "Test Plan" section (may be empty): `.ai-qa/test-plan.md`.
          - Issues this PR closed: `.ai-qa/linked-issues.json` (array of
            {number,title,body,state,url,labels}) — the acceptance criteria the
            deployed change is expected to satisfy.

          Smoke-test the deployed app over HTTP with `curl` (the health URL and
          any routes the diff touches — the base URL is the health URL minus its
          path). A non-healthy deploy, or any touched route returning 5xx /
          refusing connection, is a P0.

          Evaluate the PR's test plan. Read `.ai-qa/test-plan.md`. If it is
          non-empty, execute/verify each item you can against the DEPLOYED app
          (via `curl`) and the merged code (the allowlisted build/test tools are
          available), then return a `test_plan` object: `present: true` and an
          `items` array where each entry has the item `text`, a `status` of
          `passed` (you verified it holds — cite how in `evidence`), `failed`
          (you verified it does NOT hold), or `unverifiable` (needs manual/QA
          steps you cannot perform here), plus optional `evidence`. Only mark
          `passed` with real evidence — never assert a step passed without
          actually exercising it. A failed test-plan item is at least a P2 (see
          the rubric). If `.ai-qa/test-plan.md` is empty, return
          `test_plan: { present: false }`. Also sanity-check the deployed change
          against any linked issue's acceptance criteria.

          Return your findings via the required structured-output schema:
          `verdict`, `confidence`, `merge_risk`, `deploy_status`, per-severity
          `counts`, a one-paragraph `summary`, `report_markdown` (the full
          human-readable report body, findings grouped by severity, the smoke
          tests you ran, and any commands you chose to run), and the `test_plan`
          object described above. Do not fabricate — if you could not reach an
          endpoint or run a command, say so.

    - name: Publish report
      id: publish
      if: always() && steps.merge.outputs.skip != 'true'
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        AUTHOR_LOGIN: ${{ steps.identity.outputs.author-login }}
        PR_NUMBER: ${{ steps.merge.outputs.pr-number }}
        MERGE_SHA: ${{ steps.merge.outputs.merge-sha }}
        HEALTH_STATUS: ${{ steps.health.outputs.status }}
        HEALTH_URL: ${{ inputs.health-url }}
        DEPLOY_TIMEOUT: ${{ inputs.deploy-timeout }}
        QA_OUTPUT: ${{ steps.review.outputs.structured_output }}
        REVIEW_OUTCOME: ${{ steps.review.outcome }}
        PASS_LABEL: ${{ inputs.pass-label }}
        FAIL_LABEL: ${{ inputs.fail-label }}
        UPDATE_PR_BODY: ${{ inputs.update-pr-body }}
        UPDATE_LINKED_ISSUES: ${{ inputs.update-linked-issues }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      with:
        github-token: ${{ steps.identity.outputs.author-token }}
        script: |
          const prNumber = Number(process.env.PR_NUMBER);
          const healthOk = process.env.HEALTH_STATUS === 'healthy';

          // Parse the QA review's structured output. Absent when no Anthropic
          // credential was configured or the review step errored out.
          let qa = null;
          try {
            const parsed = JSON.parse(process.env.QA_OUTPUT || '{}');
            if (parsed && typeof parsed === 'object') qa = parsed;
          } catch (err) {
            core.warning(`could not parse QA structured output: ${err.message}`);
          }

          const counts = { p0: 0, p1: 0, p2: 0, p3: 0 };
          let reportMd = '';
          let modelSummary = '';
          let mergeRisk = 'low';
          const qaRan = !!(qa && qa.counts);
          if (qaRan) {
            counts.p0 = Number(qa.counts.p0) || 0;
            counts.p1 = Number(qa.counts.p1) || 0;
            counts.p2 = Number(qa.counts.p2) || 0;
            counts.p3 = Number(qa.counts.p3) || 0;
            reportMd = typeof qa.report_markdown === 'string' ? qa.report_markdown : '';
            modelSummary = typeof qa.summary === 'string' ? qa.summary : '';
            mergeRisk = typeof qa.merge_risk === 'string' ? qa.merge_risk : 'low';
          }

          // Deterministic recompute — never trust the model's own verdict.
          // A non-healthy deploy is an automatic P0 on top of the model's counts.
          const deployP0 = healthOk ? 0 : 1;
          const p0 = counts.p0 + deployP0;
          const p1 = counts.p1;
          const p2 = counts.p2;
          const overallPass = p0 === 0 && p1 === 0 && p2 === 0;
          let confidence = 100 - 30 * p0 - 15 * p1 - 10 * p2;
          confidence = Math.max(0, Math.min(100, confidence));

          const body = [];
          body.push('<!-- ai-qa -->');
          body.push(overallPass ? '### ✅ ai-qa: PASS' : '### ❌ ai-qa: FAIL');
          body.push('');
          body.push(`Merge commit \`${process.env.MERGE_SHA.slice(0, 12)}\``);
          body.push('');
          body.push('| Signal | Result |');
          body.push('| --- | --- |');
          body.push(`| Deploy health (\`${process.env.HEALTH_URL}\`) | ${healthOk ? '✅ healthy' : `⏱️ not healthy within ${process.env.DEPLOY_TIMEOUT}s`} |`);
          if (qaRan) {
            body.push(`| QA review | ${confidence}% confidence · merge risk ${mergeRisk} |`);
            body.push(`| Code findings | P0 ${counts.p0} · P1 ${counts.p1} · P2 ${counts.p2} · P3 ${counts.p3} |`);
          } else {
            body.push(`| QA review | ⚠️ did not run — reporting deploy-health signal only |`);
          }

          if (modelSummary) {
            body.push('');
            body.push(modelSummary);
          }

          if (reportMd) {
            body.push('');
            body.push('<details><summary>Full QA report</summary>');
            body.push('');
            body.push(reportMd);
            body.push('');
            body.push('</details>');
          }

          if (qaRan && process.env.REVIEW_OUTCOME === 'failure') {
            body.push('');
            body.push('> ⚠️ The QA review step reported a non-zero outcome — the report above may be partial.');
          }

          body.push('');
          body.push(`_Posted by \`${process.env.AUTHOR_LOGIN}\` · [workflow run](${process.env.RUN_URL})_`);

          const commentBody = body.join('\n');

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            per_page: 100,
          });
          const existing = comments.find((c) => c.body && c.body.includes('<!-- ai-qa -->'));

          if (existing) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: existing.id,
              body: commentBody,
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: commentBody,
            });
          }

          const addLabel = overallPass ? process.env.PASS_LABEL : process.env.FAIL_LABEL;
          const removeLabel = overallPass ? process.env.FAIL_LABEL : process.env.PASS_LABEL;

          await github.rest.issues.addLabels({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: prNumber,
            labels: [addLabel],
          });

          try {
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              name: removeLabel,
            });
          } catch (err) {
            if (err.status !== 404 && err.status !== 422) {
              throw err;
            }
          }

          // --- Feature: update linked issues + PR body by last QA status -----
          // Reflect the final QA verdict onto the issues this PR closed and into
          // the merged PR's description. All writes are best-effort and never
          // fail the job. Gated by update-linked-issues / update-pr-body.
          const overallStatus = overallPass ? 'PASS' : 'FAIL';
          const statusIcon = overallPass ? '✅' : '❌';

          const issueMarker = '<!-- ai-qa-issue -->';
          const issueStatusBody = [
            issueMarker,
            `${statusIcon} **ai-qa: ${overallStatus}** for merged PR #${prNumber} (\`${process.env.MERGE_SHA.slice(0, 12)}\`)`,
            '',
            modelSummary || (healthOk ? 'Post-merge QA completed.' : 'Deploy did not become healthy within the timeout.'),
            '',
            `_Deploy health: ${healthOk ? 'healthy' : 'not healthy'} · [QA run](${process.env.RUN_URL})_`,
          ].join('\n');

          let linkedIssues = [];
          try {
            const fs = require('fs');
            const parsedIssues = JSON.parse(fs.readFileSync('.ai-qa/linked-issues.json', 'utf8'));
            if (Array.isArray(parsedIssues)) linkedIssues = parsedIssues;
          } catch (err) {
            core.info(`No linked-issues file to read: ${err.message}`);
          }

          if (process.env.UPDATE_LINKED_ISSUES === 'true' && linkedIssues.length > 0) {
            for (const issue of linkedIssues) {
              const num = Number(issue && issue.number);
              if (!num) continue;
              try {
                const iComments = await github.paginate(github.rest.issues.listComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: num,
                  per_page: 100,
                });
                const iExisting = iComments.find((c) => c.body && c.body.includes(issueMarker));
                if (iExisting) {
                  await github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: iExisting.id,
                    body: issueStatusBody,
                  });
                } else {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num,
                    body: issueStatusBody,
                  });
                }

                // On FAIL, reopen a linked issue the merge auto-closed.
                if (!overallPass && String(issue.state || '').toLowerCase() === 'closed') {
                  try {
                    await github.rest.issues.update({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: num,
                      state: 'open',
                    });
                    core.info(`Reopened linked issue #${num} (QA failed).`);
                  } catch (e) {
                    core.warning(`Could not reopen #${num}: ${e.message}`);
                  }
                }

                const iAdd = overallPass ? process.env.PASS_LABEL : process.env.FAIL_LABEL;
                const iRemove = overallPass ? process.env.FAIL_LABEL : process.env.PASS_LABEL;
                try {
                  await github.rest.issues.addLabels({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num,
                    labels: [iAdd],
                  });
                } catch (e) {
                  if (e.status !== 404 && e.status !== 422) core.warning(`label add on #${num}: ${e.message}`);
                }
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: num,
                    name: iRemove,
                  });
                } catch (e) {
                  if (e.status !== 404 && e.status !== 422) core.warning(`label remove on #${num}: ${e.message}`);
                }
              } catch (err) {
                core.warning(`Could not update linked issue #${num}: ${err.message}`);
              }
            }
          }

          if (process.env.UPDATE_PR_BODY === 'true') {
            try {
              const { data: prData } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              const originalBody = prData.body || '';
              const START = '<!-- ai-qa-status -->';
              const END = '<!-- /ai-qa-status -->';
              const block = [
                START,
                `#### ${statusIcon} ai-qa: ${overallStatus}`,
                `Deploy health: ${healthOk ? 'healthy' : 'not healthy'} · findings P0 ${counts.p0} · P1 ${counts.p1} · P2 ${counts.p2} · P3 ${counts.p3}`,
                modelSummary ? `\n${modelSummary}` : '',
                `\n_Last updated by ai-qa · [QA run](${process.env.RUN_URL})_`,
                END,
              ].filter((l) => l !== '').join('\n');
              const blockRe = new RegExp(`${START}[\\s\\S]*?${END}`);
              let newBody;
              if (blockRe.test(originalBody)) {
                newBody = originalBody.replace(blockRe, block);
              } else {
                newBody = `${originalBody.replace(/\s*$/, '')}\n\n${block}\n`;
              }
              if (newBody !== originalBody) {
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  body: newBody,
                });
                core.info('Updated PR body ai-qa status block.');
              }
            } catch (err) {
              core.warning(`Could not update PR body: ${err.message}`);
            }
          }
